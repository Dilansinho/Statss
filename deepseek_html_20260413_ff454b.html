<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>STATSBET — Tracker de Apuestas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --bg2:#0e1119; --bg3:#131720; --card:#171d28; --card2:#1d2433;
  --border:#1f2840; --border2:#283350;
  --accent:#00d4ff; --adim:rgba(0,212,255,.1); --abright:rgba(0,212,255,.2);
  --green:#00e5a0; --gdim:rgba(0,229,160,.08); --gbright:rgba(0,229,160,.15);
  --red:#ff4560; --rdim:rgba(255,69,96,.08);
  --yellow:#f5c518; --ydim:rgba(245,197,24,.08);
  --orange:#ff8c42;
  --text:#dce3f0; --text2:#6b7a99; --text3:#3a4560;
  --mono:'DM Mono', monospace;
  --head:'Syne', sans-serif;
  --body:'DM Sans', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:14px; }
body { 
  background:var(--bg); color:var(--text); font-family:var(--body); 
  min-height:100vh; overflow-x:hidden; 
  -webkit-tap-highlight-color: transparent;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ═══════════════════════ LOGIN ═══════════════════════ */
#loginScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; z-index:2000;
  transition:opacity .4s;
}
.login-wrap { width:360px; max-width:94vw; }
.login-logo {
  font-family:var(--head); font-size:clamp(28px,8vw,32px); font-weight:800; letter-spacing:4px;
  text-align:center; margin-bottom:2px; color:var(--text);
}
.login-logo span { color:var(--accent); }
.login-tagline {
  text-align:center; font-family:var(--mono); font-size:10px; color:var(--text3);
  letter-spacing:3px; text-transform:uppercase; margin-bottom:36px;
}
.login-box {
  background:var(--card); border:1px solid var(--border2); border-radius:14px;
  padding:clamp(24px,6vw,36px) clamp(20px,5vw,32px); 
  box-shadow:0 0 80px rgba(0,212,255,.04);
}
.fl { font-family:var(--mono); font-size:10px; color:var(--text2); letter-spacing:2px;
      text-transform:uppercase; margin-bottom:6px; display:block; }
.fi {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:11px 14px; color:var(--text); font-family:var(--body); font-size:14px;
  margin-bottom:14px; outline:none; transition:border-color .2s;
}
.fi:focus { border-color:var(--accent); }

/* ═══════════════════════ NAV ═══════════════════════ */
nav {
  background:var(--bg2); border-bottom:1px solid var(--border);
  height:52px; display:flex; align-items:center; justify-content:space-between;
  padding:0 clamp(10px,3vw,22px); position:sticky; top:0; z-index:100;
}
.nav-logo { 
  font-family:var(--head); font-size:clamp(14px,4vw,18px); 
  font-weight:800; letter-spacing:2px; 
}
.nav-logo span { color:var(--accent); }
.nav-tabs { display:flex; gap:2px; flex-wrap:wrap; }
.ntab {
  padding:5px clamp(6px,2vw,14px); border-radius:5px; font-family:var(--mono); 
  font-size:clamp(9px,2.5vw,11px); font-weight:500; letter-spacing:1px; 
  text-transform:uppercase; cursor:pointer; color:var(--text2); 
  border:none; background:none; transition:all .2s; white-space:nowrap;
}
.ntab:hover { color:var(--text); background:var(--bg3); }
.ntab.active { color:var(--accent); background:var(--adim); }
.nav-r { display:flex; align-items:center; gap:clamp(6px,2vw,14px); }
.nav-user { 
  font-family:var(--mono); font-size:clamp(8px,2vw,11px); 
  color:var(--text3); letter-spacing:1px; 
}
.nav-user b { color:var(--accent); }
.btn-out {
  background:none; border:1px solid var(--border); color:var(--text3); 
  padding:4px clamp(8px,2vw,12px); border-radius:5px; 
  font-family:var(--mono); font-size:clamp(8px,2vw,10px); 
  letter-spacing:1px; cursor:pointer; transition:all .2s; 
  text-transform:uppercase; white-space:nowrap;
}
.btn-out:hover { border-color:var(--red); color:var(--red); }

/* ═══════════════════════ API STATUS ═══════════════════════ */
.api-bar {
  background:var(--bg3); border-bottom:1px solid var(--border); 
  padding:6px clamp(10px,3vw,22px); display:flex; align-items:center; 
  gap:8px; font-family:var(--mono); font-size:9px; color:var(--text3); 
  letter-spacing:1px; flex-wrap:wrap;
}
.api-dot { width:6px; height:6px; border-radius:50%; background:var(--text3); flex-shrink:0; }
.api-dot.live { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
.api-dot.err { background:var(--red); }
.api-dot.warning { background:var(--yellow); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.api-key-input {
  background:transparent; border:none; border-bottom:1px solid var(--border); 
  color:var(--accent); font-family:var(--mono); font-size:9px; 
  letter-spacing:1px; width:clamp(120px,30vw,240px); outline:none; padding:2px 0;
}
.btn-api, .btn-debug { 
  padding:3px 8px; border-radius:4px; font-family:var(--mono); 
  font-size:9px; cursor:pointer; letter-spacing:1px; transition:all .2s; 
  white-space:nowrap;
}
.btn-api { 
  background:var(--adim); border:1px solid var(--accent); color:var(--accent); 
}
.btn-api:hover { background:var(--accent); color:var(--bg); }
.btn-debug { 
  background:var(--ydim); border:1px solid var(--yellow); color:var(--yellow); 
}
.btn-debug:hover { background:var(--yellow); color:var(--bg); }

/* ═══════════════════════ LAYOUT ═══════════════════════ */
#app { display:none; }
main { 
  padding:clamp(10px,3vw,18px) clamp(12px,4vw,20px); 
  max-width:1440px; margin:0 auto; 
}
.sec { display:none; }
.sec.active { display:block; }
.grid2 { display:grid; grid-template-columns:270px 1fr; gap:16px; }

/* ═══════════════════════ SIDEBAR ═══════════════════════ */
.sidebar { display:flex; flex-direction:column; gap:12px; }
.scard { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.scard-h {
  padding:11px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.scard-title { font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:2px;
  text-transform:uppercase; color:var(--text2); }
.scard-b { padding:8px; }

.titem { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:7px;
  cursor:pointer; transition:background .15s; }
.titem:hover { background:var(--bg3); }
.titem.active { background:var(--adim); }
.ti-abbr {
  width:32px; height:32px; border-radius:6px; background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-family:var(--head);
  font-size:12px; font-weight:800; color:var(--accent); flex-shrink:0;
}
.ti-name { font-family:var(--head); font-size:13px; font-weight:700; line-height:1.2; }
.ti-lg { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; margin-top:2px; }
.ti-form { display:flex; gap:2px; margin-top:4px; flex-wrap:wrap; }
.fb { width:13px; height:13px; border-radius:2px; display:flex; align-items:center;
  justify-content:center; font-size:7px; font-weight:700; color:var(--bg); font-family:var(--mono); }
.fb.W { background:var(--green); }
.fb.D { background:var(--yellow); }
.fb.L { background:var(--red); }
.btn-addteam {
  width:100%; padding:8px; background:none; border:1px dashed var(--border2); border-radius:7px;
  color:var(--text3); font-family:var(--mono); font-size:10px; letter-spacing:1px; cursor:pointer;
  transition:all .2s; margin-top:4px; text-transform:uppercase;
}
.btn-addteam:hover { border-color:var(--accent); color:var(--accent); }

/* ═══════════════════════ MATCH CARDS ═══════════════════════ */
.mcol { display:flex; flex-direction:column; gap:clamp(8px,2vw,12px); }
.sh {
  font-family:var(--mono); font-size:clamp(9px,2.5vw,10px); font-weight:500; 
  letter-spacing:2px; color:var(--text3); text-transform:uppercase; 
  margin-bottom:6px; display:flex; align-items:center; gap:8px;
}
.sh::after { content:''; flex:1; height:1px; background:var(--border); }

.mcard {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  overflow:hidden; cursor:pointer; transition:border-color .2s, background .2s;
}
.mcard:hover { border-color:var(--border2); background:var(--card2); }
.mcard.live { border-color:rgba(255,69,96,.3); }
.mcard-top {
  padding:8px 12px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.mc-league { 
  font-family:var(--mono); font-size:clamp(7px,2vw,9px); color:var(--text3); 
  letter-spacing:1px; text-transform:uppercase; 
}
.mc-time { font-family:var(--mono); font-size:clamp(9px,2.5vw,11px); color:var(--text2); }
.live-badge {
  background:var(--rdim); color:var(--red); padding:2px 6px; border-radius:3px;
  font-family:var(--mono); font-size:clamp(8px,2vw,10px); font-weight:500; 
  letter-spacing:1px; border:1px solid rgba(255,69,96,.2);
}
.mcard-body { 
  padding:clamp(8px,2vw,10px) clamp(10px,3vw,14px) clamp(10px,2.5vw,12px); 
  display:flex; align-items:center; gap:6px; 
}
.mteam { flex:1; }
.mteam-name { 
  font-family:var(--head); font-size:clamp(14px,4vw,18px); 
  font-weight:800; line-height:1.1; 
}
.mscore {
  text-align:center; min-width:clamp(40px,12vw,56px); 
  font-family:var(--head); font-size:clamp(20px,6vw,28px); font-weight:800;
}
.mscore.vs { font-size:clamp(10px,3vw,12px); color:var(--text3); font-family:var(--mono); letter-spacing:2px; }
.mcard-stats {
  background:var(--bg3); border-top:1px solid var(--border);
  display:grid; grid-template-columns:repeat(5,1fr);
}
.mst {
  padding:6px 3px; text-align:center; border-right:1px solid var(--border);
}
.mst:last-child { border-right:none; }
.mst-val { font-family:var(--mono); font-size:clamp(11px,3vw,14px); font-weight:500; }
.mst-lbl { 
  font-family:var(--mono); font-size:clamp(6px,1.8vw,8px); color:var(--text3); 
  letter-spacing:1px; text-transform:uppercase; margin-top:2px; 
}

/* ═══════════════════════ MODAL ═══════════════════════ */
.modal-ov {
  position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:500;
  display:flex; align-items:flex-end; justify-content:center; opacity:0;
  pointer-events:none; transition:opacity .25s; backdrop-filter:blur(8px);
}
@media (min-width:640px) {
  .modal-ov { align-items:center; }
}
.modal-ov.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--card); border:1px solid var(--border2); 
  border-radius:clamp(12px,3vw,14px) clamp(12px,3vw,14px) 0 0;
  width:100%; max-width:640px; max-height:85vh; overflow-y:auto;
  transform:translateY(16px); transition:transform .25s;
  box-shadow:0 -4px 30px rgba(0,0,0,.5);
}
@media (min-width:640px) {
  .modal { border-radius:14px; width:640px; max-width:96vw; }
}
.modal-ov.open .modal { transform:translateY(0); }
.modal-h {
  padding:clamp(14px,4vw,16px) clamp(16px,4vw,20px) clamp(10px,3vw,12px);
  border-bottom:1px solid var(--border); display:flex; align-items:center; 
  justify-content:space-between; position:sticky; top:0; 
  background:var(--card); z-index:2;
}
.modal-title { 
  font-family:var(--head); font-size:clamp(16px,4.5vw,18px); 
  font-weight:800; letter-spacing:1px; 
}
.mclose { 
  background:none; border:none; color:var(--text3); font-size:22px; 
  cursor:pointer; transition:color .2s; line-height:1; 
  font-family:var(--mono); padding:8px; margin:-8px;
}
.mclose:hover { color:var(--text); }
.modal-b { padding:clamp(14px,4vw,18px) clamp(14px,4vw,20px); }

/* ═══════════════════════ SCORE BLOCK ═══════════════════════ */
.score-block {
  background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:clamp(14px,4vw,20px); margin-bottom:16px; text-align:center;
}
.score-row { 
  display:flex; align-items:center; justify-content:center; 
  gap:clamp(10px,3vw,20px); margin-bottom:8px; 
}
.score-team-name { 
  font-family:var(--head); font-size:clamp(16px,4.5vw,20px); 
  font-weight:800; flex:1; word-break:break-word;
}
.score-team-name.away { text-align:right; }
.score-num { 
  font-family:var(--head); font-size:clamp(36px,10vw,48px); 
  font-weight:800; min-width:70px; text-align:center; line-height:1; 
}

/* ═══════════════════════ BET WIZARD MEJORADO ═══════════════════════ */
.btn-new-bet {
  width:100%; padding:12px; margin-top:10px; background:none; 
  border:1px dashed var(--border2); border-radius:8px; color:var(--text3); 
  font-family:var(--mono); font-size:11px; letter-spacing:1.5px; 
  cursor:pointer; transition:all .2s; text-transform:uppercase;
}
.btn-new-bet:hover { border-color:var(--accent); color:var(--accent); }

.bet-wizard { margin-top:12px; display:none; }
.bet-wizard.open { display:block; }

.wiz-label { 
  font-family:var(--mono); font-size:10px; color:var(--text2); 
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; display:block; 
}
.wiz-input {
  width:100%; background:var(--bg3); border:1px solid var(--border); 
  border-radius:8px; padding:12px 14px; color:var(--text); 
  font-family:var(--body); font-size:14px; outline:none; 
  transition:border-color .2s; margin-bottom:12px;
}
.wiz-input:focus { border-color:var(--accent); }

/* Grupos de mercado */
.mkt-group {
  background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  margin-bottom:8px; overflow:hidden;
}
.mkt-group-header {
  padding:12px 14px 10px; font-family:var(--head); font-size:15px; font-weight:800;
  color:var(--text); border-bottom:1px solid var(--border); background:var(--card);
  letter-spacing:.3px;
}
.mkt-opts-row {
  display:flex; flex-wrap:wrap; gap:6px; padding:10px;
}
.mkt-opt-btn {
  flex:1; min-width:calc(50% - 6px); padding:12px 10px;
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  color:var(--text2); font-family:var(--head); font-size:13px; font-weight:600;
  cursor:pointer; transition:all .15s; text-align:center; line-height:1.3;
}
@media (min-width:400px) {
  .mkt-opt-btn { min-width:90px; }
}
.mkt-opt-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--adim); }
.mkt-opt-btn.sel { border-color:var(--accent); color:var(--accent); background:var(--adim); }
.mon { font-size:14px; font-weight:700; }
.mos { font-family:var(--mono); font-size:9px; color:var(--text3); margin-top:2px; letter-spacing:.3px; }

/* OU Step - Aparece debajo del grupo */
.ou-step-card {
  background:var(--card2); border:1px solid var(--border2); border-radius:10px;
  padding:14px; margin:8px 0; animation:fadeIn .2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.ou-step-title {
  font-family:var(--head); font-size:14px; font-weight:800; color:var(--text);
  margin-bottom:12px; letter-spacing:.3px;
}
.ou-line-label {
  font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:8px; display:block;
}
.ou-slider-wrap { padding:6px 0 12px; }
.ou-slider { 
  width:100%; accent-color:var(--accent); cursor:pointer; 
  height:5px; -webkit-appearance:none; background:var(--border); 
  border-radius:3px;
}
.ou-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:22px; height:22px; 
  background:var(--accent); border-radius:50%; cursor:pointer;
  box-shadow:0 0 10px var(--accent);
}
.ou-slider-val {
  text-align:center; font-family:var(--mono); font-size:28px; font-weight:500;
  color:var(--accent); margin-bottom:8px; letter-spacing:1px;
}
.ou-slider-range { 
  display:flex; justify-content:space-between;
  font-family:var(--mono); font-size:9px; color:var(--text3); margin-top:4px; 
}
.num-chips-container { display:flex; gap:6px; flex-wrap:wrap; margin:14px 0 6px; }
.num-chip {
  padding:8px 14px; background:var(--bg3); border:1px solid var(--border); 
  border-radius:6px; color:var(--text2); font-family:var(--mono); 
  font-size:13px; font-weight:500; cursor:pointer; transition:all .15s;
}
.num-chip:hover { border-color:var(--accent); color:var(--accent); }
.num-chip.sel { border-color:var(--accent); color:var(--accent); background:var(--adim); }

.ou-actions { display:flex; gap:8px; margin-top:16px; }
.btn-ou-add {
  flex:1; padding:12px; background:var(--accent); color:var(--bg); 
  font-family:var(--head); font-size:14px; font-weight:800; letter-spacing:1.5px;
  border:none; border-radius:8px; cursor:pointer; transition:opacity .2s;
  text-transform:uppercase;
}
.btn-ou-add:hover { opacity:.85; }
.btn-ou-cancel {
  padding:12px 16px; background:none; border:1px solid var(--border); 
  border-radius:8px; color:var(--text3); font-family:var(--mono); 
  font-size:11px; cursor:pointer; transition:all .2s; text-transform:uppercase;
}
.btn-ou-cancel:hover { border-color:var(--red); color:var(--red); }

/* Added conditions */
.ac-chip {
  display:flex; align-items:center; gap:10px; padding:10px 14px; 
  background:var(--card2); border:1px solid var(--border2); border-radius:8px; 
  margin-bottom:6px;
}
.ac-chip-info { flex:1; }
.ac-chip-name { font-family:var(--head); font-size:13px; font-weight:700; color:var(--text); }
.ac-chip-pick { font-family:var(--mono); font-size:10px; color:var(--text3); margin-top:2px; letter-spacing:.3px; }
.ac-rm { 
  color:var(--text3); cursor:pointer; font-size:16px; transition:color .2s; 
  line-height:1; font-family:var(--mono); padding:6px; margin:-6px;
}
.ac-rm:hover { color:var(--red); }

.btn-save-bet {
  width:100%; padding:14px; margin-top:16px; background:var(--accent); 
  color:var(--bg); font-family:var(--head); font-size:15px; font-weight:800; 
  letter-spacing:2px; border:none; border-radius:8px; cursor:pointer; 
  transition:opacity .2s; text-transform:uppercase;
}
.btn-save-bet:hover { opacity:.85; }

/* Cond row */
.cond-row {
  display:flex; align-items:flex-start; gap:10px; padding:12px;
  background:var(--bg3); border-radius:8px; margin-bottom:6px; 
  border:1px solid var(--border);
}
.cond-status-icon {
  width:28px; height:28px; border-radius:5px; display:flex; 
  align-items:center; justify-content:center; font-family:var(--mono); 
  font-size:11px; font-weight:700; flex-shrink:0; 
}
.cond-status-icon.ok { background:var(--gdim); color:var(--green); border:1px solid rgba(0,229,160,.2); }
.cond-status-icon.fail { background:var(--rdim); color:var(--red); border:1px solid rgba(255,69,96,.2); }
.cond-status-icon.pending { background:var(--ydim); color:var(--yellow); border:1px solid rgba(245,197,24,.2); }
.cond-main { flex:1; }
.cond-text { font-family:var(--head); font-size:13px; font-weight:700; margin-bottom:4px; }
.cond-sub { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.cond-prog-labels { display:flex; justify-content:space-between; font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:.5px; margin-bottom:4px; }
.cond-bar { height:4px; background:var(--border); border-radius:2px; }
.cond-fill { height:100%; border-radius:2px; transition:width .5s; }
.cond-fill.ok { background:var(--green); }
.cond-fill.fail { background:var(--red); }
.cond-fill.pending { background:var(--yellow); }

function toast(msg, duration = 3000) {
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();

  div.className = 'toast';
  div.textContent = msg;

function readStat(match, statId) {
  if (!match) return 0;
  const s = match.stats || {};
  const sc = match.score || { h: 0, a: 0 };
  const statMap = {
    'goals_total': () => (sc.h || 0) + (sc.a || 0),
    'goals_home': () => sc.h || 0,
    'goals_away': () => sc.a || 0,
    'corners_total': () => (s.corners?.h || 0) + (s.corners?.a || 0),
    'corners_home': () => s.corners?.h || 0,
    'corners_away': () => s.corners?.a || 0,
    'cards_total': () => (s.cards?.h || 0) + (s.cards?.a || 0),
    'cards_home': () => s.cards?.h || 0,
    'cards_away': () => s.cards?.a || 0,
    'shots_total': () => (s.shots?.h || 0) + (s.shots?.a || 0),
    'shots_on_total': () => (s.shotsT?.h || 0) + (s.shotsT?.a || 0),
  };
  const fn = statMap[statId];
  return fn ? fn() : 0;
}

function condStatus(c) {
  const current = c.current || 0;
  const target = c.target || 0;
  const dir = c.dir || 'over';
  const matchStatus = c.matchStatus || 'today';
  
  if (matchStatus === 'finished') {
    if (dir === 'over') return current >= target ? 'ok' : 'fail';
    if (dir === 'under') return current <= target ? 'ok' : 'fail';
  }
  if (dir === 'over' && current >= target) return 'ok';
  if (dir === 'under' && current > target) return 'fail';
  return 'pending';
}

function evalOverall(bet) {
  if (!bet.conditions?.length) return 'pending';
  const statuses = bet.conditions.map(c => condStatus(c));
  if (statuses.every(s => s === 'ok')) return 'won';
  if (statuses.some(s => s === 'fail')) return 'lost';
  if (statuses.some(s => s === 'pending')) return 'pending';
  const okCount = statuses.filter(s => s === 'ok').length;
  return okCount > 0 ? 'partial' : 'pending';
}

async function testAPI() {
  const panel = document.getElementById('debugPanel');
  panel.style.display = 'block';
  panel.className = 'debug-panel';
  panel.innerHTML = '<div class="debug-line">🔍 Probando API...</div>';
  
  if (!apiKey) {
    panel.innerHTML += '<div class="debug-error">❌ Sin API Key</div>';
    return;
  }
  
  const testPath = 'competitions/PL/matches?status=SCHEDULED&dateFrom='+today()+'&dateTo='+today();
  
  // Directo
  try {
    const res = await fetch('https://api.football-data.org/v4/' + testPath, {
      headers: { 'X-Auth-Token': apiKey }
    });
    if (res.ok) {
      activeProxyIndex = -1;
      setApiStatus('live', '✅ Conectado DIRECTAMENTE');
      saveApiKey(apiKey);
      await loadRealMatches();
      panel.innerHTML += '<div class="debug-success">✅ Directo OK</div>';
      setTimeout(() => panel.style.display = 'none', 3000);
      return;
    }
  } catch(e) {}
  
  // Proxies
  for (let i = 0; i < PROXY_URLS.length; i++) {
    try {
      const proxyUrl = PROXY_URLS[i];
      const url = proxyUrl.includes('?') 
        ? proxyUrl + encodeURIComponent('https://api.football-data.org/v4/' + testPath)
        : proxyUrl + '?path=' + encodeURIComponent(testPath) + '&token=' + encodeURIComponent(apiKey);
      
      const res = await fetch(url);
      if (res.ok) {
        activeProxyIndex = i;
        setApiStatus('live', `✅ Conectado via Proxy ${i+1}`);
        saveApiKey(apiKey);
        await loadRealMatches();
        panel.innerHTML += '<div class="debug-success">✅ Proxy OK</div>';
        setTimeout(() => panel.style.display = 'none', 3000);
        return;
      }
    } catch(e) {}
  }
  
  setApiStatus('err', '❌ Fallo conexion');
  panel.innerHTML += '<div class="debug-error">❌ Todos fallaron</div>';
}

async function connectAPI() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if(!key) { toast('Ingrese API key'); return; }
  apiKey = key;
  setApiStatus('loading', 'Conectando...');
  await testAPI();
}

function today() { return new Date().toISOString().split('T')[0]; }
function nxtWeek() { const d = new Date(); d.setDate(d.getDate() + 7); return d.toISOString().split('T')[0]; }

function setApiStatus(state, msg) {
  const dot = document.getElementById('apiDot');
  const st  = document.getElementById('apiStatus');
  dot.className = 'api-dot' + (state==='live'?' live': state==='err'?' err':'');
  st.textContent = msg;
}

async function loadRealMatches() {
  const t = today();
  const allMatches = [];
  for (const { code, liga } of FD_COMPS) {
    try {
      let data;
      if (activeProxyIndex === -1) {
        const res = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?dateFrom=${t}&dateTo=${t}`, {
          headers: { 'X-Auth-Token': apiKey }
        });
        data = await res.json();
      } else {
        const proxyUrl = PROXY_URLS[activeProxyIndex];
        const path = `competitions/${code}/matches?dateFrom=${t}&dateTo=${t}`;
        const url = proxyUrl.includes('?') 
          ? proxyUrl + encodeURIComponent('https://api.football-data.org/v4/' + path)
          : proxyUrl + '?path=' + encodeURIComponent(path) + '&token=' + encodeURIComponent(apiKey);
        const res = await fetch(url);
        data = await res.json();
      }
      if (data.matches) allMatches.push(...data.matches.map(m => ({...m, _liga: liga})));
    } catch(e) {}
  }
  if (allMatches.length) {
    matches = allMatches.map(mapFD).filter(Boolean);
    renderMatchesByStatus();
    toast(`${matches.length} partidos cargados`);
  }
  await loadUpcoming();
}

async function loadUpcoming() {
  const from = today(), to = nxtWeek();
  const all = [];
  for (const { code, liga } of FD_COMPS) {
    try {
      const path = `competitions/${code}/matches?status=SCHEDULED&dateFrom=${from}&dateTo=${to}`;
      let data;
      if (activeProxyIndex === -1) {
        const res = await fetch('https://api.football-data.org/v4/' + path, { headers: { 'X-Auth-Token': apiKey } });
        data = await res.json();
      } else {
        const proxyUrl = PROXY_URLS[activeProxyIndex];
        const url = proxyUrl.includes('?') 
          ? proxyUrl + encodeURIComponent('https://api.football-data.org/v4/' + path)
          : proxyUrl + '?path=' + encodeURIComponent(path) + '&token=' + encodeURIComponent(apiKey);
        const res = await fetch(url);
        data = await res.json();
      }
      if (data.matches) all.push(...data.matches.map(m => ({...m, _liga: liga})));
    } catch(e) {}
  }
  if (all.length) {
    upcomingList = all.slice(0,30).map(m => ({
      id: 'u' + m.id, h: m.homeTeam.shortName || m.homeTeam.name,
      a: m.awayTeam.shortName || m.awayTeam.name, lg: m.competition.name,
      liga: m._liga || 'other', date: fmtDate(m.utcDate), time: fmtTime(m.utcDate),
    }));
    renderUpcoming();
  }
}

function mapFD(m) {
  const status = ['IN_PLAY','PAUSED','LIVE'].includes(m.status) ? 'live' : (m.status === 'FINISHED' ? 'finished' : 'today');
  const sc = m.score.fullTime;
  return {
    id: 'fd' + m.id, h: m.homeTeam.shortName || m.homeTeam.name,
    a: m.awayTeam.shortName || m.awayTeam.name, lg: m.competition.name,
    liga: m._liga || 'other', status,
    time: status === 'live' ? (m.minute ? m.minute + "'" : 'EN VIVO') : fmtTime(m.utcDate),
    date: fmtDate(m.utcDate),
    score: sc.home !== null ? { h: sc.home, a: sc.away } : null,
    stats: null,
  };
}

function fmtTime(utc) {
  if(!utc) return '--:--';
  return new Date(utc).toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });
}
function fmtDate(utc) {
  if(!utc) return '';
  const d = new Date(utc);
  return `${['Dom','Lun','Mar','Mie','Jue','Vie','Sab'][d.getDay()]} ${d.getDate()} ${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]}`;
}

function openMatchModal(id) {
  const m = matches.find(x=>x.id===id) || upcomingList.find(x=>x.id===id);
  if(!m) return;
  if(!matches.find(x=>x.id===id)) matches.push({...m, status:'upcoming', score:null, stats:null});

  document.getElementById('mmTitle').textContent = m.h + ' vs ' + m.a;
  let html = buildScoreBlock(m);
  html += buildBetTracker(id, m);
  document.getElementById('mmBody').innerHTML = html;
  document.getElementById('matchModal').classList.add('open');
}

function buildScoreBlock(m) {
  if(m.score) {
    return `<div class="score-block">
      <div class="score-row"><div class="score-team-name">${m.h}</div><div class="score-num">${m.score.h}-${m.score.a}</div><div class="score-team-name away">${m.a}</div></div>
      <div class="score-meta">${m.lg} — ${m.date}</div>
    </div>`;
  }
  return `<div class="score-block">
    <div class="score-row"><div class="score-team-name">${m.h}</div><div class="score-num" style="color:var(--text3);font-size:24px">VS</div><div class="score-team-name away">${m.a}</div></div>
    <div class="score-meta">${m.lg} — ${m.date} — ${m.time}</div>

}

function buildBetTracker(matchId, m) {
  const myBets = bets.filter(b=>b.matchId===matchId);
  let html = `<div class="bt-header">Mis Apuestas</div>`;
  html += myBets.map((b,i)=>buildBetEntryHtml(b,i)).join('');
  html += buildBetWizard(matchId, m);
  return html;
}

function buildBetEntryHtml(b, i) {
  const ov = evalOverall(b);
  return `
  <div class="bet-entry">
    <div class="bet-entry-h" onclick="toggleBetBody('bb-${b.id}', this)">
      <div class="be-title">${b.desc||('Apuesta '+(i+1))}</div>
      <div class="be-right">
        <div class="be-badge ${ov}">${ov==='won'?'GANADA':ov==='lost'?'PERDIDA':'PENDIENTE'}</div>
        <span class="be-chev">▼</span>
      </div>
    </div>
    <div class="bet-entry-b" id="bb-${b.id}">
      ${b.conditions.map(c=>buildCondRow(c)).join('')}
    </div>
  </div>`;
}

function buildCondRow(c) {
  const st = condStatus(c);
  const pct = c.target>0 ? Math.min(100,Math.round(c.current/c.target*100)) : 0;
  return `
  <div class="cond-row">
    <div class="cond-status-icon ${st}">${st==='ok'?'✓':st==='fail'?'✗':'○'}</div>
    <div class="cond-main">
      <div class="cond-text">${c.mktName}</div>
      <div class="cond-sub">${c.dirLabel}</div>
      <div class="cond-prog-labels"><span>Actual: ${c.current}</span><span>Target: ${c.target}</span></div>
      <div class="cond-bar"><div class="cond-fill ${st}" style="width:${pct}%"></div></div>
    </div>
    <div class="cond-val ${st}">${c.current}/${c.target}</div>
  </div>`;
}

function toggleBetBody(id, header) {
  const body = document.getElementById(id);
  const chev = header.querySelector('.be-chev');
  body.classList.toggle('open');
  chev.classList.toggle('open');

function selectMarketOpt(matchId, mktId, opt) {
  const mkt = MARKETS.find(m=>m.id===mktId);
  if(!mkt) return;
  
  if(!wizardState[matchId]) wizardState[matchId] = { conds: [] };
  const ws = wizardState[matchId];
  
  document.querySelectorAll('#wiz-'+matchId+' .mkt-opt-btn').forEach(b=>b.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  
  ws.mkt = mkt;
  ws.opt = opt;
  ws.dir = opt;
  showOUStep(matchId, mkt, opt);
}

function showOUStep(matchId, mkt, opt) {
  const existing = document.getElementById('oupick-'+matchId);
  const suggestions = OU_SUGGESTIONS[mkt.id] || OU_SUGGESTIONS.default;
  const maxVal = mkt.id.includes('corners') ? 20 : (mkt.id.includes('cards') ? 10 : 10);
  
  let html = `<div class="ou-step-card">`;
  html += `<div class="ou-step-title">${mkt.name} — ${opt==='over'?'OVER':'UNDER'}</div>`;
  html += `<div class="ou-line-label">Línea</div>`;
  html += `<div class="ou-slider-wrap">`;
  html += `<div class="ou-slider-val" id="slider-val-${matchId}">2.5</div>`;
  html += `<input type="range" class="ou-slider" id="slider-${matchId}" min="0.5" max="${maxVal}" step="0.5" value="2.5" oninput="updateSliderVal('${matchId}', this.value)">`;
  html += `<div class="ou-slider-range"><span>0.5</span><span>${maxVal}</span></div>`;
  html += `</div>`;
  html += `<div class="num-chips-container">`;
  suggestions.forEach(v => html += `<button class="num-chip" onclick="setSliderVal('${matchId}', '${v}')">${v}</button>`);
  html += `</div>`;
  html += `<div class="ou-actions">`;
  html += `<button class="btn-ou-add" onclick="addCondFromSlider('${matchId}')">Agregar Condición</button>`;
  html += `<button class="btn-ou-cancel" onclick="closeOUStep('${matchId}')">Cancelar</button>`;
  html += `</div></div>`;
  
  existing.innerHTML = html;
  existing.style.display = 'block';
}

function updateSliderVal(matchId, val) {
  document.getElementById('slider-val-'+matchId).textContent = parseFloat(val).toFixed(1);
}

function setSliderVal(matchId, val) {
  const slider = document.getElementById('slider-'+matchId);
  if(slider) { slider.value = val; updateSliderVal(matchId, val); }
}

function closeOUStep(matchId) {
  document.getElementById('oupick-'+matchId).style.display = 'none';
  const ws = wizardState[matchId];
  if(ws) { ws.mkt = null; ws.opt = null; ws.dir = null; }
}

function addCondFromSlider(matchId) {
  const ws = wizardState[matchId];
  if(!ws || !ws.mkt) { toast('Selecciona un mercado'); return; }
  
  const sliderEl = document.getElementById('slider-'+matchId);
  const val = sliderEl ? parseFloat(sliderEl.value) : 2.5;
  const mkt = ws.mkt;
  const dir = ws.opt;
  
  // Obtener nombres reales de equipos
  const m = matches.find(x=>x.id===matchId) || upcomingList.find(x=>x.id===matchId);
  const homeTeam = m?.h || 'Local';
  const awayTeam = m?.a || 'Visitante';
  
  let dirLabel = (dir==='over'?'OVER ':'UNDER ') + val.toFixed(1);
  
  // Personalizar con nombres de equipos
  if (mkt.id.includes('_home')) dirLabel = homeTeam + ' ' + dirLabel;
  else if (mkt.id.includes('_away')) dirLabel = awayTeam + ' ' + dirLabel;
  else dirLabel = 'Total ' + dirLabel;
  
  const current = m ? readStat(m, mkt.stat) : 0;
  
  if(!ws.conds) ws.conds = [];
  ws.conds.push({
    mktId: mkt.id, mktName: mkt.name, dir, dirLabel,
    target: val, current, stat: mkt.stat, matchStatus: m?.status || 'today'
  });
  
  closeOUStep(matchId);
  ws.mkt = null; ws.dir = null; ws.opt = null;
  renderAddedConds(matchId);
  toast('Condición agregada');
}

function renderAddedConds(matchId) {
  const ws = wizardState[matchId];
  const el = document.getElementById('aclist-'+matchId);
  if(!el) return;
  let html = '';
  (ws?.conds || []).forEach((c, i) => {
    html += `<div class="ac-chip">
      <div class="ac-chip-info"><div class="ac-chip-name">${c.mktName}</div><div class="ac-chip-pick">${c.dirLabel}</div></div>
      <span class="ac-rm" onclick="removeCondWiz('${matchId}',${i})">✕</span>
    </div>`;
  });
  el.innerHTML = html;
}

function removeCondWiz(matchId, i) {
  if(wizardState[matchId]?.conds) {
    wizardState[matchId].conds.splice(i, 1);
    renderAddedConds(matchId);
  }
}

function saveBetWizard(matchId, h, a, lg, date) {
  const ws = wizardState[matchId];
  const descEl = document.getElementById('wd-'+matchId);
  const desc = (descEl?.value) || (h + ' vs ' + a);
  
  if(!ws?.conds?.length) { toast('Agrega al menos una condición'); return; }
  
  const newBet = {
    id: 'b'+Date.now(), matchId, h, a, lg, date,
    status: 'pending', desc, conditions: ws.conds.slice()
  };
  bets.push(newBet);
  saveBets();
  wizardState[matchId] = {conds:[]};
  
  document.getElementById('matchModal').classList.remove('open');
  renderBets();
  renderSummary();
  toast('✅ Apuesta guardada');
}

function buildMktGroupsHtml(matchId) {
  let html = '';
  const categories = [...new Set(MARKETS.map(m => m.cat))];
  categories.forEach(cat => {
    html += `<div class="mkt-group"><div class="mkt-group-header">${cat}</div><div class="mkt-opts-row">`;
    MARKETS.filter(m => m.cat === cat).forEach(mkt => {
      html += `<div class="mkt-opt-btn" onclick="selectMarketOpt('${matchId}','${mkt.id}','over')"><div class="mon">OVER</div><div class="mos">${mkt.name}</div></div>`;
      html += `<div class="mkt-opt-btn" onclick="selectMarketOpt('${matchId}','${mkt.id}','under')"><div class="mon">UNDER</div><div class="mos">${mkt.name}</div></div>`;
    });
    html += `</div></div>`;
  });
  return html;
}

function buildBetWizard(matchId, m) {
  const wid = 'wiz-'+matchId;
  const mh = (m?.h||'').replace(/'/g,"\\'");
  const ma = (m?.a||'').replace(/'/g,"\\'");
  const ml = (m?.lg||'').replace(/'/g,"\\'");
  const md = (m?.date||'').replace(/'/g,"\\'");
  
  return `
    <button class="btn-new-bet" onclick="toggleWizard('${wid}')">+ Nueva Apuesta</button>
    <div class="bet-wizard" id="${wid}">
      <label class="wiz-label">Descripción</label>
      <input class="wiz-input" id="wd-${matchId}" placeholder="Ej: Over 2.5 goles" value="${mh} vs ${ma}">
      <label class="wiz-label">Mercados</label>
      ${buildMktGroupsHtml(matchId)}
      <div id="oupick-${matchId}"></div>
      <div id="aclist-${matchId}"></div>
      <button class="btn-save-bet" onclick="saveBetWizard('${matchId}','${mh}','${ma}','${ml}','${md}')">Guardar Apuesta</button>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════
// UPCOMING & BETS
// ═══════════════════════════════════════════════════════════════════════════
function renderUpcoming() {
  const container = document.getElementById('upcomingDiv');
  let filtered = upcomingList;
  if(currentUpFilter === 'fav') {
    const favNames = TEAMS.filter(t => favIds.includes(t.id)).map(t => t.name);
    filtered = upcomingList.filter(u => favNames.includes(u.h) || favNames.includes(u.a));
  } else if(currentUpFilter !== 'all') {
    filtered = upcomingList.filter(u => u.liga === currentUpFilter);
  }
  if(!filtered.length) {
    container.innerHTML = '<div class="empty-state">No hay partidos</div>';
    return;
  }
  container.innerHTML = filtered.map(u => `
    <div class="urow" onclick="openMatchModal('${u.id}')">
      <div style="flex:1"><div class="uteams">${u.h} vs ${u.a}</div><div class="umeta">${u.lg}</div></div>
      <div style="text-align:right"><div class="utime-big">${u.time}</div><div class="utime-date">${u.date}</div></div>
      <button class="btn-track" onclick="event.stopPropagation();openMatchModal('${u.id}')">Seguir</button>
    </div>
  `).join('');
}

function filterUp(filter, btn) {
  currentUpFilter = filter;
  document.querySelectorAll('#sec-proximos .ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderUpcoming();
}

function renderBets() {
  const container = document.getElementById('betsDiv');
  let filtered = bets;
  if(currentBetFilter !== 'all') filtered = bets.filter(b => b.status === currentBetFilter);
  
  if(!filtered.length) {
    container.innerHTML = '<div class="empty-state">No hay apuestas</div>';
    return;
  }
  container.innerHTML = filtered.map(b => {
    const ov = evalOverall(b);
    return `
      <div class="acard ${ov}">
        <div class="acard-h" onclick="toggleBetBody('betlist-${b.id}', this)">
          <div><div class="amatch">${b.h} vs ${b.a}</div><div class="ameta">${b.desc}</div></div>
          <div class="be-badge ${ov}">${ov==='won'?'GANADA':ov==='lost'?'PERDIDA':'PENDIENTE'}</div>
        </div>
        <div class="acard-b" id="betlist-${b.id}">${b.conditions.map(c=>buildCondRow(c)).join('')}</div>
      </div>
    `;
  }).join('');
}

function renderSummary() {
  const total = bets.length;
  const won = bets.filter(b => evalOverall(b) === 'won').length;
  const lost = bets.filter(b => evalOverall(b) === 'lost').length;
  const pending = bets.filter(b => evalOverall(b) === 'pending').length;
  document.getElementById('sumDiv').innerHTML = `
    <div class="sum-card"><div class="sum-val">${total}</div><div class="sum-lbl">Total</div></div>
    <div class="sum-card"><div class="sum-val g">${won}</div><div class="sum-lbl">Ganadas</div></div>
    <div class="sum-card"><div class="sum-val r">${lost}</div><div class="sum-lbl">Perdidas</div></div>
    <div class="sum-card"><div class="sum-val a">${pending}</div><div class="sum-lbl">Pendientes</div></div>
  `;
}

function filterBets(filter, btn) {
  currentBetFilter = filter;
  document.querySelectorAll('#sec-apuestas .ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBets();
}
