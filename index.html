<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATSBET — Tracker de Apuestas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --bg2:#0e1119; --bg3:#131720; --card:#171d28; --card2:#1d2433;
  --border:#1f2840; --border2:#283350;
  --accent:#00d4ff; --adim:rgba(0,212,255,.1); --abright:rgba(0,212,255,.2);
  --green:#00e5a0; --gdim:rgba(0,229,160,.08); --gbright:rgba(0,229,160,.15);
  --red:#ff4560; --rdim:rgba(255,69,96,.08);
  --yellow:#f5c518; --ydim:rgba(245,197,24,.08);
  --orange:#ff8c42;
  --text:#dce3f0; --text2:#6b7a99; --text3:#3a4560;
  --mono:'DM Mono', monospace;
  --head:'Syne', sans-serif;
  --body:'DM Sans', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:14px; }
body { background:var(--bg); color:var(--text); font-family:var(--body); min-height:100vh; overflow-x:hidden; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ═══════════════════════ LOGIN ═══════════════════════ */
#loginScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; z-index:2000;
  transition:opacity .4s;
}
.login-wrap {
  width:360px; max-width:94vw;
}
.login-logo {
  font-family:var(--head); font-size:32px; font-weight:800; letter-spacing:4px;
  text-align:center; margin-bottom:2px; color:var(--text);
}
.login-logo span { color:var(--accent); }
.login-tagline {
  text-align:center; font-family:var(--mono); font-size:10px; color:var(--text3);
  letter-spacing:3px; text-transform:uppercase; margin-bottom:36px;
}
.login-box {
  background:var(--card); border:1px solid var(--border2); border-radius:14px;
  padding:36px 32px; box-shadow:0 0 80px rgba(0,212,255,.04);
}
.fl { font-family:var(--mono); font-size:10px; color:var(--text2); letter-spacing:2px;
      text-transform:uppercase; margin-bottom:6px; display:block; }
.fi {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:11px 14px; color:var(--text); font-family:var(--body); font-size:14px;
  margin-bottom:14px; outline:none; transition:border-color .2s;
}
.fi:focus { border-color:var(--accent); }
.btn-login {
  width:100%; padding:13px; background:var(--accent); color:var(--bg); font-family:var(--head);
  font-size:15px; font-weight:800; letter-spacing:3px; border:none; border-radius:8px;
  cursor:pointer; transition:opacity .2s; margin-top:4px;
}
.btn-login:hover { opacity:.85; }
.login-hint { text-align:center; font-family:var(--mono); font-size:10px; color:var(--text3); margin-top:14px; letter-spacing:1px; }

/* ═══════════════════════ NAV ═══════════════════════ */
nav {
  background:var(--bg2); border-bottom:1px solid var(--border);
  height:52px; display:flex; align-items:center; justify-content:space-between;
  padding:0 22px; position:sticky; top:0; z-index:100;
}
.nav-logo { font-family:var(--head); font-size:18px; font-weight:800; letter-spacing:4px; }
.nav-logo span { color:var(--accent); }
.nav-tabs { display:flex; gap:2px; }
.ntab {
  padding:6px 14px; border-radius:5px; font-family:var(--mono); font-size:11px;
  font-weight:500; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer;
  color:var(--text2); border:none; background:none; transition:all .2s;
}
.ntab:hover { color:var(--text); background:var(--bg3); }
.ntab.active { color:var(--accent); background:var(--adim); }
.nav-r { display:flex; align-items:center; gap:14px; }
.nav-user { font-family:var(--mono); font-size:11px; color:var(--text3); letter-spacing:1px; }
.nav-user b { color:var(--accent); }
.btn-out {
  background:none; border:1px solid var(--border); color:var(--text3); padding:5px 12px;
  border-radius:5px; font-family:var(--mono); font-size:10px; letter-spacing:1px; cursor:pointer;
  transition:all .2s; text-transform:uppercase;
}
.btn-out:hover { border-color:var(--red); color:var(--red); }

/* ═══════════════════════ API STATUS ═══════════════════════ */
.api-bar {
  background:var(--bg3); border-bottom:1px solid var(--border); padding:6px 22px;
  display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:10px;
  color:var(--text3); letter-spacing:1px;
}
.api-dot { width:6px; height:6px; border-radius:50%; background:var(--text3); flex-shrink:0; }
.api-dot.live { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
.api-dot.err { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.api-key-input {
  background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--accent);
  font-family:var(--mono); font-size:10px; letter-spacing:1px; width:240px; outline:none;
  padding:2px 0;
}
.btn-api { padding:3px 10px; background:var(--adim); border:1px solid var(--accent); color:var(--accent);
  border-radius:4px; font-family:var(--mono); font-size:10px; cursor:pointer; letter-spacing:1px; transition:background .2s; }
.btn-api:hover { background:var(--accent); color:var(--bg); }

/* ═══════════════════════ LAYOUT ═══════════════════════ */
#app { display:none; }
main { padding:18px 20px; max-width:1440px; margin:0 auto; }
.sec { display:none; }
.sec.active { display:block; }
.grid2 { display:grid; grid-template-columns:270px 1fr; gap:16px; }

/* ═══════════════════════ SIDEBAR ═══════════════════════ */
.sidebar { display:flex; flex-direction:column; gap:12px; }
.scard { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.scard-h {
  padding:11px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.scard-title { font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:2px;
  text-transform:uppercase; color:var(--text2); }
.scard-b { padding:8px; }

.titem { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:7px;
  cursor:pointer; transition:background .15s; }
.titem:hover { background:var(--bg3); }
.titem.active { background:var(--adim); }
.ti-abbr {
  width:32px; height:32px; border-radius:6px; background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-family:var(--head);
  font-size:12px; font-weight:800; color:var(--accent); flex-shrink:0;
}
.ti-name { font-family:var(--head); font-size:13px; font-weight:700; line-height:1.2; }
.ti-lg { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; margin-top:2px; }
.ti-form { display:flex; gap:2px; margin-top:4px; }
.fb { width:13px; height:13px; border-radius:2px; display:flex; align-items:center;
  justify-content:center; font-size:7px; font-weight:700; color:var(--bg); font-family:var(--mono); }
.fb.W { background:var(--green); }
.fb.D { background:var(--yellow); }
.fb.L { background:var(--red); }
.btn-addteam {
  width:100%; padding:8px; background:none; border:1px dashed var(--border2); border-radius:7px;
  color:var(--text3); font-family:var(--mono); font-size:10px; letter-spacing:1px; cursor:pointer;
  transition:all .2s; margin-top:4px; text-transform:uppercase;
}
.btn-addteam:hover { border-color:var(--accent); color:var(--accent); }

/* TEAM STATS */
.ts-row {
  display:flex; align-items:center; justify-content:space-between; padding:8px 14px;
  border-bottom:1px solid var(--border);
}
.ts-row:last-child { border-bottom:none; }
.ts-lbl { font-family:var(--mono); font-size:10px; color:var(--text2); letter-spacing:1px; }
.ts-val { font-family:var(--mono); font-size:14px; font-weight:500; }
.ts-val.a { color:var(--accent); }
.ts-val.g { color:var(--green); }
.ts-val.y { color:var(--yellow); }
.ts-val.r { color:var(--red); }

/* ═══════════════════════ MATCH CARDS ═══════════════════════ */
.mcol { display:flex; flex-direction:column; gap:12px; }
.sh {
  font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:2.5px;
  color:var(--text3); text-transform:uppercase; margin-bottom:8px;
  display:flex; align-items:center; gap:10px;
}
.sh::after { content:''; flex:1; height:1px; background:var(--border); }

.mcard {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  overflow:hidden; cursor:pointer; transition:border-color .2s, background .2s;
}
.mcard:hover { border-color:var(--border2); background:var(--card2); }
.mcard.live { border-color:rgba(255,69,96,.3); }
.mcard-top {
  padding:9px 14px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.mc-league { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; }
.mc-time { font-family:var(--mono); font-size:11px; color:var(--text2); }
.live-badge {
  background:var(--rdim); color:var(--red); padding:2px 8px; border-radius:3px;
  font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:1px;
  border:1px solid rgba(255,69,96,.2);
}
.mcard-body { padding:10px 14px 12px; display:flex; align-items:center; gap:8px; }
.mteam { flex:1; }
.mteam-name { font-family:var(--head); font-size:18px; font-weight:800; line-height:1; }
.mteam-rec { font-family:var(--mono); font-size:9px; color:var(--text3); margin-top:3px; letter-spacing:.5px; }
.mscore {
  text-align:center; min-width:56px; font-family:var(--head); font-size:28px; font-weight:800;
}
.mscore.vs { font-size:12px; color:var(--text3); font-family:var(--mono); letter-spacing:2px; }
.mcard-stats {
  background:var(--bg3); border-top:1px solid var(--border);
  display:grid; grid-template-columns:repeat(5,1fr);
}
.mst {
  padding:8px 6px; text-align:center; border-right:1px solid var(--border);
}
.mst:last-child { border-right:none; }
.mst-val { font-family:var(--mono); font-size:14px; font-weight:500; }
.mst-lbl { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:1px;
  text-transform:uppercase; margin-top:2px; }
.mst.corners .mst-val { color:var(--accent); }
.mst.cards .mst-val { color:var(--yellow); }
.mst.goals .mst-val { color:var(--green); }
.mst.shots .mst-val { color:var(--orange); }
.mst.poss .mst-val { color:var(--text2); }

/* ═══════════════════════ MODAL ═══════════════════════ */
.modal-ov {
  position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:500;
  display:flex; align-items:center; justify-content:center; opacity:0;
  pointer-events:none; transition:opacity .25s; backdrop-filter:blur(8px);
}
.modal-ov.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--card); border:1px solid var(--border2); border-radius:14px;
  width:640px; max-width:96vw; max-height:90vh; overflow-y:auto;
  transform:translateY(16px); transition:transform .25s;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
}
.modal-ov.open .modal { transform:translateY(0); }
.modal-h {
  padding:16px 20px 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; background:var(--card); z-index:2;
}
.modal-title { font-family:var(--head); font-size:18px; font-weight:800; letter-spacing:1px; }
.mclose { background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer;
  transition:color .2s; line-height:1; font-family:var(--mono); }
.mclose:hover { color:var(--text); }
.modal-b { padding:18px 20px; }

/* SCORE BLOCK */
.score-block {
  background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:20px; margin-bottom:16px; text-align:center;
}
.score-row { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:8px; }
.score-team-name { font-family:var(--head); font-size:20px; font-weight:800; flex:1; }
.score-team-name.away { text-align:right; }
.score-num { font-family:var(--head); font-size:48px; font-weight:800; min-width:80px; text-align:center; line-height:1; }
.score-meta { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; }
.ht-score { font-family:var(--mono); font-size:11px; color:var(--text2); margin-top:4px; letter-spacing:1px; }

/* MODAL TABS */
.mtabs { display:flex; gap:4px; margin-bottom:14px; }
.mtab {
  flex:1; padding:8px; background:var(--bg3); border:1px solid var(--border); border-radius:6px;
  color:var(--text3); font-family:var(--mono); font-size:10px; font-weight:500; cursor:pointer;
  text-align:center; transition:all .2s; letter-spacing:1.5px; text-transform:uppercase;
}
.mtab.active { background:var(--adim); border-color:var(--accent); color:var(--accent); }

/* STAT BARS */
.sb-section {
  font-family:var(--mono); font-size:9px; font-weight:500; letter-spacing:2px; color:var(--text3);
  text-transform:uppercase; padding:12px 0 8px; border-bottom:1px solid var(--border); margin-bottom:10px;
}
.sb-row { margin-bottom:12px; }
.sb-nums { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
.sb-home { font-family:var(--mono); font-size:15px; font-weight:500; color:var(--red); }
.sb-label { font-family:var(--mono); font-size:10px; color:var(--text2); text-align:center; flex:1; letter-spacing:.5px; }
.sb-away { font-family:var(--mono); font-size:15px; font-weight:500; color:var(--accent); }
.sb-track { height:4px; background:var(--border); border-radius:2px; display:flex; overflow:hidden; }
.sb-left { height:100%; background:var(--red); transition:width .6s; }
.sb-right { height:100%; background:var(--accent); flex:1; transition:width .6s; }

/* ═══════════════════════ BET TRACKER ═══════════════════════ */
.bt-header {
  font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:2px; color:var(--text2);
  text-transform:uppercase; margin-bottom:12px; padding-top:16px; border-top:1px solid var(--border);
  margin-top:16px;
}
.bet-entry { background:var(--bg3); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; overflow:hidden; }
.bet-entry-h {
  padding:11px 14px; display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; transition:background .15s;
}
.bet-entry-h:hover { background:var(--card2); }
.be-title { font-family:var(--head); font-size:14px; font-weight:700; }
.be-right { display:flex; align-items:center; gap:8px; }
.be-badge {
  padding:3px 9px; border-radius:3px; font-family:var(--mono); font-size:9px;
  font-weight:500; letter-spacing:1.5px; text-transform:uppercase;
}
.be-badge.won { background:var(--gdim); color:var(--green); border:1px solid rgba(0,229,160,.2); }
.be-badge.lost { background:var(--rdim); color:var(--red); border:1px solid rgba(255,69,96,.2); }
.be-badge.pending { background:var(--ydim); color:var(--yellow); border:1px solid rgba(245,197,24,.2); }
.be-badge.partial { background:var(--adim); color:var(--accent); border:1px solid rgba(0,212,255,.2); }
.be-chev { font-family:var(--mono); font-size:12px; color:var(--text3); transition:transform .2s; }
.be-chev.open { transform:rotate(180deg); }
.bet-entry-b { display:none; padding:0 14px 12px; }
.bet-entry-b.open { display:block; }

/* CONDICION */
.cond-row {
  display:flex; align-items:flex-start; gap:10px; padding:10px 12px;
  background:var(--card); border-radius:7px; margin-bottom:6px; border:1px solid var(--border);
}
.cond-status-icon {
  width:24px; height:24px; border-radius:4px; display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:10px; font-weight:700; flex-shrink:0; margin-top:1px;
}
.cond-status-icon.ok { background:var(--gdim); color:var(--green); border:1px solid rgba(0,229,160,.2); }
.cond-status-icon.fail { background:var(--rdim); color:var(--red); border:1px solid rgba(255,69,96,.2); }
.cond-status-icon.pending { background:var(--ydim); color:var(--yellow); border:1px solid rgba(245,197,24,.2); }
.cond-main { flex:1; }
.cond-text { font-family:var(--head); font-size:13px; font-weight:700; margin-bottom:5px; }
.cond-sub { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
.cond-prog-labels { display:flex; justify-content:space-between; font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:.5px; margin-bottom:3px; }
.cond-bar { height:3px; background:var(--border); border-radius:2px; }
.cond-fill { height:100%; border-radius:2px; transition:width .5s; }
.cond-fill.ok { background:var(--green); }
.cond-fill.fail { background:var(--red); }
.cond-fill.pending { background:var(--yellow); }
.cond-val { font-family:var(--mono); font-size:16px; font-weight:500; text-align:right; min-width:52px; margin-top:2px; }
.cond-val.ok { color:var(--green); }
.cond-val.fail { color:var(--red); }
.cond-val.pending { color:var(--yellow); }

/* ═══════════════════════ BET FORM - WIZARD (Betano style) ═══════════════════════ */
.btn-new-bet {
  width:100%; padding:10px; margin-top:10px; background:none; border:1px dashed var(--border2);
  border-radius:7px; color:var(--text3); font-family:var(--mono); font-size:10px;
  letter-spacing:1.5px; cursor:pointer; transition:all .2s; text-transform:uppercase;
}
.btn-new-bet:hover { border-color:var(--accent); color:var(--accent); }

.bet-wizard { margin-top:10px; display:none; }
.bet-wizard.open { display:block; }
.wiz-label { font-family:var(--mono); font-size:10px; color:var(--text2); letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:6px; display:block; }
.wiz-input {
  width:100%; background:var(--card); border:1px solid var(--border); border-radius:6px;
  padding:9px 12px; color:var(--text); font-family:var(--body); font-size:13px;
  outline:none; transition:border-color .2s; margin-bottom:10px;
}
.wiz-input:focus { border-color:var(--accent); }

/* MARKET GROUPS — tarjetas por categoria tipo Betano */
.mkt-group {
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  margin-bottom:6px; overflow:hidden;
}
.mkt-group-header {
  padding:11px 13px 9px; font-family:var(--head); font-size:15px; font-weight:800;
  color:var(--text); border-bottom:1px solid var(--border); background:var(--bg3);
  letter-spacing:.3px;
}
.mkt-opts-row {
  display:flex; flex-wrap:wrap; gap:5px; padding:9px 9px;
}
.mkt-opt-btn {
  flex:1; min-width:80px; padding:10px 12px;
  background:var(--bg3); border:1px solid var(--border); border-radius:7px;
  color:var(--text2); font-family:var(--head); font-size:13px; font-weight:600;
  cursor:pointer; transition:all .15s; text-align:center; line-height:1.3;
}
.mkt-opt-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--adim); }
.mkt-opt-btn.sel { border-color:var(--accent); color:var(--accent); background:var(--adim); }
.mkt-opt-sub { font-family:var(--mono); font-size:8px; color:var(--text3); margin-top:2px; letter-spacing:.3px; display:block; }

/* OU STEP — aparece pegado debajo del grupo seleccionado */
.ou-picker { display:none; } /* kept for compat */
.ou-inline-step { display:block; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.ou-step-card {
  background:var(--card2); border:1px solid var(--border2); border-radius:8px;
  padding:12px 13px; margin-bottom:6px;
}
.ou-step-title {
  font-family:var(--head); font-size:13px; font-weight:800; color:var(--text);
  margin-bottom:10px; letter-spacing:.3px;
}
.ou-row { display:flex; gap:6px; margin-bottom:10px; }
.ou-btn {
  flex:1; padding:10px; background:var(--bg3); border:1px solid var(--border); border-radius:6px;
  color:var(--text2); font-family:var(--head); font-size:14px; font-weight:700;
  letter-spacing:.5px; cursor:pointer; transition:all .15s; text-align:center;
}
.ou-btn:hover { border-color:var(--accent); color:var(--a
