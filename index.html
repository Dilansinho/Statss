<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>STATSBET -- Tracker de Apuestas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --bg2:#0e1119; --bg3:#131720; --card:#171d28; --card2:#1d2433;
  --border:#1f2840; --border2:#283350;
  --accent:#00d4ff; --adim:rgba(0,212,255,.1); --abright:rgba(0,212,255,.2);
  --green:#00e5a0; --gdim:rgba(0,229,160,.08); --gbright:rgba(0,229,160,.15);
  --red:#ff4560; --rdim:rgba(255,69,96,.08);
  --yellow:#f5c518; --ydim:rgba(245,197,24,.08);
  --orange:#ff8c42;
  --text:#dce3f0; --text2:#6b7a99; --text3:#3a4560;
  --mono:'DM Mono', monospace;
  --head:'Syne', sans-serif;
  --body:'DM Sans', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:14px; }
body { 
  background:var(--bg); color:var(--text); font-family:var(--body); 
  min-height:100vh; overflow-x:hidden; 
  -webkit-tap-highlight-color: transparent;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

#loginScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; z-index:2000;
  transition:opacity .4s;
}
.login-wrap { width:360px; max-width:94vw; }
.login-logo {
  font-family:var(--head); font-size:clamp(28px,8vw,32px); font-weight:800; letter-spacing:4px;
  text-align:center; margin-bottom:2px; color:var(--text);
}
.login-logo span { color:var(--accent); }
.login-tagline {
  text-align:center; font-family:var(--mono); font-size:10px; color:var(--text3);
  letter-spacing:3px; text-transform:uppercase; margin-bottom:36px;
}
.login-box {
  background:var(--card); border:1px solid var(--border2); border-radius:14px;
  padding:clamp(24px,6vw,36px) clamp(20px,5vw,32px); 
  box-shadow:0 0 80px rgba(0,212,255,.04);
}
.fi {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:11px 14px; color:var(--text); font-family:var(--body); font-size:14px;
  margin-bottom:14px; outline:none;
}

nav {
  background:var(--bg2); border-bottom:1px solid var(--border);
  height:52px; display:flex; align-items:center; justify-content:space-between;
  padding:0 clamp(10px,3vw,22px); position:sticky; top:0; z-index:100;
}
.nav-logo { 
  font-family:var(--head); font-size:clamp(14px,4vw,18px); 
  font-weight:800; letter-spacing:2px; 
}
.nav-logo span { color:var(--accent); }
.nav-tabs { display:flex; gap:2px; flex-wrap:wrap; }
.ntab {
  padding:5px clamp(6px,2vw,14px); border-radius:5px; font-family:var(--mono); 
  font-size:clamp(9px,2.5vw,11px); font-weight:500; letter-spacing:1px; 
  text-transform:uppercase; cursor:pointer; color:var(--text2); 
  border:none; background:none; transition:all .2s; white-space:nowrap;
}
.ntab:hover { color:var(--text); background:var(--bg3); }
.ntab.active { color:var(--accent); background:var(--adim); }
.nav-r { display:flex; align-items:center; gap:clamp(6px,2vw,14px); }
.nav-user { 
  font-family:var(--mono); font-size:clamp(8px,2vw,11px); 
  color:var(--text3); letter-spacing:1px; 
}
.nav-user b { color:var(--accent); }
.btn-out {
  background:none; border:1px solid var(--border); color:var(--text3); 
  padding:4px clamp(8px,2vw,12px); border-radius:5px; 
  font-family:var(--mono); font-size:clamp(8px,2vw,10px); 
  letter-spacing:1px; cursor:pointer; transition:all .2s; 
  text-transform:uppercase; white-space:nowrap;
}
.btn-out:hover { border-color:var(--red); color:var(--red); }

.api-bar {
  background:var(--bg3); border-bottom:1px solid var(--border); 
  padding:6px clamp(10px,3vw,22px); display:flex; align-items:center; 
  gap:8px; font-family:var(--mono); font-size:9px; color:var(--text3); 
  letter-spacing:1px; flex-wrap:wrap;
}
.api-dot { width:6px; height:6px; border-radius:50%; background:var(--text3); flex-shrink:0; }
.api-dot.live { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
.api-dot.err { background:var(--red); }
.api-dot.loading { background:var(--yellow); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.api-key-input {
  background:transparent; border:none; border-bottom:1px solid var(--border); 
  color:var(--accent); font-family:var(--mono); font-size:9px; 
  letter-spacing:1px; width:clamp(200px,30vw,280px); outline:none; padding:2px 0;
}
.btn-api { 
  padding:3px 10px; background:var(--adim); border:1px solid var(--accent); 
  color:var(--accent); border-radius:4px; font-family:var(--mono); 
  font-size:9px; cursor:pointer; letter-spacing:1px; transition:all .2s; 
}
.btn-api:hover { background:var(--accent); color:var(--bg); }
.btn-debug { 
  padding:3px 10px; background:var(--ydim); border:1px solid var(--yellow); 
  color:var(--yellow); border-radius:4px; font-family:var(--mono); 
  font-size:9px; cursor:pointer; letter-spacing:1px; transition:all .2s; 
}
.btn-debug:hover { background:var(--yellow); color:var(--bg); }

#app { display:none; }
main { 
  padding:clamp(10px,3vw,18px) clamp(12px,4vw,20px); 
  max-width:1440px; margin:0 auto; 
}
.sec { display:none; }
.sec.active { display:block; }
.grid2 { display:grid; grid-template-columns:270px 1fr; gap:16px; }

.sidebar { display:flex; flex-direction:column; gap:12px; }
.scard { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.scard-h {
  padding:11px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.scard-title { font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:2px;
  text-transform:uppercase; color:var(--text2); }
.scard-b { padding:8px; }

.titem { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:7px;
  cursor:pointer; transition:background .15s; }
.titem:hover { background:var(--bg3); }
.ti-abbr {
  width:32px; height:32px; border-radius:6px; background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-family:var(--head);
  font-size:12px; font-weight:800; color:var(--accent); flex-shrink:0;
}
.ti-name { font-family:var(--head); font-size:13px; font-weight:700; line-height:1.2; }
.ti-lg { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; margin-top:2px; }
.ti-form { display:flex; gap:2px; margin-top:4px; flex-wrap:wrap; }
.fb { width:13px; height:13px; border-radius:2px; display:flex; align-items:center;
  justify-content:center; font-size:7px; font-weight:700; color:var(--bg); font-family:var(--mono); }
.fb.W { background:var(--green); }
.fb.D { background:var(--yellow); }
.fb.L { background:var(--red); }
.btn-addteam {
  width:100%; padding:8px; background:none; border:1px dashed var(--border2); border-radius:7px;
  color:var(--text3); font-family:var(--mono); font-size:10px; letter-spacing:1px; cursor:pointer;
  transition:all .2s; margin-top:4px; text-transform:uppercase;
}
.btn-addteam:hover { border-color:var(--accent); color:var(--accent); }

.team-stats-container { padding:8px 4px; }
.team-stat-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 12px; border-bottom:1px solid var(--border);
}
.team-stat-label {
  font-family:var(--mono); font-size:11px; color:var(--text2); 
  letter-spacing:1px; text-transform:uppercase;
}
.team-stat-value {
  font-family:var(--head); font-size:20px; font-weight:800;
}
.team-stat-bar-container { padding:6px 12px 12px; }
.team-stat-bar-label {
  display:flex; justify-content:space-between;
  font-family:var(--mono); font-size:9px; color:var(--text3);
  margin-bottom:4px;
}
.team-stat-bar {
  height:6px; background:var(--border); border-radius:3px; overflow:hidden;
}
.team-stat-bar-fill {
  height:100%; border-radius:3px; transition:width .5s;
}
.team-form-container {
  padding:12px; display:flex; gap:6px; flex-wrap:wrap;
}
.team-form-badge {
  width:32px; height:32px; border-radius:6px; display:flex; align-items:center;
  justify-content:center; font-family:var(--head); font-size:14px; font-weight:800;
}
.team-form-badge.W { background:var(--gdim); color:var(--green); border:1px solid rgba(0,229,160,.3); }
.team-form-badge.D { background:var(--ydim); color:var(--yellow); border:1px solid rgba(245,197,24,.3); }
.team-form-badge.L { background:var(--rdim); color:var(--red); border:1px solid rgba(255,69,96,.3); }

.mcol { display:flex; flex-direction:column; gap:clamp(8px,2vw,12px); }
.sh {
  font-family:var(--mono); font-size:clamp(9px,2.5vw,10px); font-weight:500; 
  letter-spacing:2px; color:var(--text3); text-transform:uppercase; 
  margin-bottom:6px; display:flex; align-items:center; gap:8px;
}
.sh::after { content:''; flex:1; height:1px; background:var(--border); }

.mcard {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  overflow:hidden; cursor:pointer; transition:border-color .2s, background .2s;
}
.mcard:hover { border-color:var(--border2); background:var(--card2); }
.mcard.live { border-color:rgba(255,69,96,.3); }
.mcard-top {
  padding:8px 12px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.mc-league { 
  font-family:var(--mono); font-size:clamp(7px,2vw,9px); color:var(--text3); 
  letter-spacing:1px; text-transform:uppercase; 
}
.mc-time { font-family:var(--mono); font-size:clamp(9px,2.5vw,11px); color:var(--text2); }
.live-badge {
  background:var(--rdim); color:var(--red); padding:2px 6px; border-radius:3px;
  font-family:var(--mono); font-size:clamp(8px,2vw,10px); font-weight:500; 
  letter-spacing:1px; border:1px solid rgba(255,69,96,.2);
}
.mcard-body { 
  padding:clamp(8px,2vw,10px) clamp(10px,3vw,14px) clamp(10px,2.5vw,12px); 
  display:flex; align-items:center; gap:6px; 
}
.mteam { flex:1; }
.mteam-name { 
  font-family:var(--head); font-size:clamp(14px,4vw,18px); 
  font-weight:800; line-height:1.1; 
}
.mscore {
  text-align:center; min-width:clamp(40px,12vw,56px); 
  font-family:var(--head); font-size:clamp(20px,6vw,28px); font-weight:800;
}
.mscore.vs { font-size:clamp(10px,3vw,12px); color:var(--text3); font-family:var(--mono); letter-spacing:2px; }

.modal-ov {
  position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:500;
  display:flex; align-items:flex-end; justify-content:center; opacity:0;
  pointer-events:none; transition:opacity .25s; backdrop-filter:blur(8px);
}
@media (min-width:640px) { .modal-ov { align-items:center; } }
.modal-ov.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--card); border:1px solid var(--border2); 
  border-radius:clamp(12px,3vw,14px) clamp(12px,3vw,14px) 0 0;
  width:100%; max-width:640px; max-height:85vh; overflow-y:auto;
  transform:translateY(16px); transition:transform .25s;
  box-shadow:0 -4px 30px rgba(0,0,0,.5);
}
@media (min-width:640px) { .modal { border-radius:14px; width:640px; max-width:96vw; } }
.modal-ov.open .modal { transform:translateY(0); }
.modal-h {
  padding:clamp(14px,4vw,16px) clamp(16px,4vw,20px) clamp(10px,3vw,12px);
  border-bottom:1px solid var(--border); display:flex; align-items:center; 
  justify-content:space-between; position:sticky; top:0; 
  background:var(--card); z-index:2;
}
.modal-title { 
  font-family:var(--head); font-size:clamp(16px,4.5vw,18px); 
  font-weight:800; letter-spacing:1px; 
}
.mclose { 
  background:none; border:none; color:var(--text3); font-size:22px; 
  cursor:pointer; transition:color .2s; line-height:1; 
  font-family:var(--mono); padding:8px; margin:-8px;
}
.mclose:hover { color:var(--text); }
.modal-b { padding:clamp(14px,4vw,18px) clamp(14px,4vw,20px); }

.score-block {
  background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:clamp(14px,4vw,20px); margin-bottom:16px; text-align:center;
}
.score-row { 
  display:flex; align-items:center; justify-content:center; 
  gap:clamp(10px,3vw,20px); margin-bottom:8px; 
}
.score-team-name { 
  font-family:var(--head); font-size:clamp(16px,4.5vw,20px); 
  font-weight:800; flex:1; word-break:break-word;
}
.score-num { 
  font-family:var(--head); font-size:clamp(36px,10vw,48px); 
  font-weight:800; min-width:70px; text-align:center; line-height:1; 
}
.score-meta { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; }

.bt-header {
  font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:2px; 
  color:var(--text2); text-transform:uppercase; margin-bottom:12px; 
  padding-top:16px; border-top:1px solid var(--border); margin-top:16px;
}
.bet-entry { background:var(--bg3); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; overflow:hidden; }
.bet-entry-h {
  padding:12px 14px; display:flex; align-items:center; justify-content:space-between;
  cursor:pointer;
}
.be-title { font-family:var(--head); font-size:14px; font-weight:700; }
.be-right { display:flex; align-items:center; gap:8px; }
.be-badge {
  padding:3px 8px; border-radius:3px; font-family:var(--mono); font-size:9px;
  font-weight:500; letter-spacing:1.5px; text-transform:uppercase;
}
.be-badge.won { background:var(--gdim); color:var(--green); border:1px solid rgba(0,229,160,.2); }
.be-badge.lost { background:var(--rdim); color:var(--red); border:1px solid rgba(255,69,96,.2); }
.be-badge.pending { background:var(--ydim); color:var(--yellow); border:1px solid rgba(245,197,24,.2); }
.be-badge.partial { background:var(--adim); color:var(--accent); }
.be-chev { font-family:var(--mono); font-size:12px; color:var(--text3); transition:transform .2s; }
.be-chev.open { transform:rotate(180deg); }
.bet-entry-b { display:none; padding:0 14px 12px; }
.bet-entry-b.open { display:block; }

.cond-row {
  display:flex; align-items:flex-start; gap:10px; padding:10px 12px;
  background:var(--card); border-radius:7px; margin-bottom:6px; border:1px solid var(--border);
}
.cond-status-icon {
  width:24px; height:24px; border-radius:4px; display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:10px; font-weight:700; flex-shrink:0;
}
.cond-status-icon.ok { background:var(--gdim); color:var(--green); border:1px solid rgba(0,229,160,.2); }
.cond-status-icon.fail { background:var(--rdim); color:var(--red); border:1px solid rgba(255,69,96,.2); }
.cond-status-icon.pending { background:var(--ydim); color:var(--yellow); border:1px solid rgba(245,197,24,.2); }
.cond-main { flex:1; }
.cond-text { font-family:var(--head); font-size:13px; font-weight:700; margin-bottom:5px; }
.cond-sub { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
.cond-prog-labels { display:flex; justify-content:space-between; font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:.5px; margin-bottom:3px; }
.cond-bar { height:3px; background:var(--border); border-radius:2px; }
.cond-fill { height:100%; border-radius:2px; transition:width .5s; }
.cond-fill.ok { background:var(--green); }
.cond-fill.fail { background:var(--red); }
.cond-fill.pending { background:var(--yellow); }
.cond-val { font-family:var(--mono); font-size:16px; font-weight:500; text-align:right; min-width:52px; }
.cond-val.ok { color:var(--green); }
.cond-val.fail { color:var(--red); }
.cond-val.pending { color:var(--yellow); }

.btn-new-bet {
  width:100%; padding:10px; margin-top:10px; background:none; border:1px dashed var(--border2);
  border-radius:7px; color:var(--text3); font-family:var(--mono); font-size:10px;
  letter-spacing:1.5px; cursor:pointer; transition:all .2s; text-transform:uppercase;
}
.btn-new-bet:hover { border-color:var(--accent); color:var(--accent); }

.bet-wizard { margin-top:10px; display:none; }
.bet-wizard.open { display:block; }

.wizard-category { margin-bottom:12px; }
.wizard-category-title {
  font-family:var(--head); font-size:15px; font-weight:800; 
  color:var(--text); margin-bottom:8px; letter-spacing:.5px;
}
.wizard-options-grid { display:flex; flex-direction:column; gap:4px; }
.wizard-option-row {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg3); border:1px solid var(--border); 
  border-radius:6px; padding:12px 14px; cursor:pointer;
  transition:all .15s;
}
.wizard-option-row:hover { border-color:var(--accent); background:var(--adim); }
.wizard-option-row.active { border-color:var(--accent); background:var(--adim); }
.wizard-option-name { font-family:var(--head); font-size:13px; font-weight:600; color:var(--text); }
.wizard-option-arrow { color:var(--text3); font-size:14px; }

.wizard-ou-step {
  background:var(--card2); border:1px solid var(--border2); 
  border-radius:8px; padding:14px; margin:8px 0;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.wizard-ou-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.wizard-ou-title {
  font-family:var(--head); font-size:14px; font-weight:800; color:var(--text);
}
.wizard-ou-close {
  color:var(--text3); cursor:pointer; font-size:16px; padding:4px 8px;
}
.wizard-ou-subtitle {
  font-family:var(--mono); font-size:9px; color:var(--accent); 
  letter-spacing:1px; text-transform:uppercase; margin-bottom:14px;
}
.wizard-slider-container { padding:6px 0; }
.wizard-slider-value {
  text-align:center; font-family:var(--head); font-size:32px; font-weight:800;
  color:var(--accent); margin-bottom:10px;
}
.wizard-slider {
  width:100%; accent-color:var(--accent); height:4px;
  -webkit-appearance:none; background:var(--border); border-radius:2px;
}
.wizard-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px; 
  background:var(--accent); border-radius:50%; cursor:pointer;
}
.wizard-slider-labels {
  display:flex; justify-content:space-between;
  font-family:var(--mono); font-size:9px; color:var(--text3);
  margin-top:4px;
}
.wizard-chips {
  display:flex; gap:6px; flex-wrap:wrap; margin:14px 0;
}
.wizard-chip {
  padding:6px 12px; background:var(--bg3); border:1px solid var(--border);
  border-radius:16px; color:var(--text2); font-family:var(--mono);
  font-size:11px; cursor:pointer; transition:all .15s;
}
.wizard-chip:hover { border-color:var(--accent); color:var(--accent); background:var(--adim); }
.wizard-ou-actions {
  display:flex; gap:8px; margin-top:16px;
}
.wizard-btn-primary {
  flex:1; padding:12px; background:var(--accent); color:var(--bg);
  font-family:var(--head); font-size:13px; font-weight:800; 
  letter-spacing:1px; border:none; border-radius:6px; cursor:pointer;
  text-transform:uppercase;
}
.wizard-btn-secondary {
  padding:12px 16px; background:none; border:1px solid var(--border);
  border-radius:6px; color:var(--text3); font-family:var(--mono);
  font-size:10px; cursor:pointer;
}

.wizard-added-conds { margin:12px 0; }
.wizard-cond-chip {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:var(--bg3); border:1px solid var(--border2); 
  border-radius:6px; margin-bottom:4px;
}
.wizard-cond-info { flex:1; }

function toast(msg, duration = 3000) {
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = msg;

function readStat(match, statId) {
  if (!match) return 0;
  const s = match.stats || {};
  const sc = match.score || { h: 0, a: 0 };
  const statMap = {
    'goals_total': () => (sc.h || 0) + (sc.a || 0),
    'goals_home': () => sc.h || 0,
    'goals_away': () => sc.a || 0,
    'ht_goals': () => match.ht ? (match.ht.h || 0) + (match.ht.a || 0) : 0,
    '2h_goals': () => {
      if (!match.ht) return 0;
      return ((sc.h || 0) + (sc.a || 0)) - ((match.ht.h || 0) + (match.ht.a || 0));
    },
    'corners_total': () => (s.corners?.h || 0) + (s.corners?.a || 0),
    'corners_home': () => s.corners?.h || 0,
    'corners_away': () => s.corners?.a || 0,
    'cards_total': () => (s.cards?.h || 0) + (s.cards?.a || 0),
    'cards_home': () => s.cards?.h || 0,
    'cards_away': () => s.cards?.a || 0,
  };
  return (statMap[statId] || (() => 0))();
}

function condStatus(c) {
  const current = c.current || 0;
  const target = c.target || 0;
  const dir = c.dir || 'over';
  const matchStatus = c.matchStatus || 'today';
  if (matchStatus === 'finished') {
    if (dir === 'over') return current >= target ? 'ok' : 'fail';
    if (dir === 'under') return current <= target ? 'ok' : 'fail';
  }
  if (dir === 'over' && current >= target) return 'ok';
  if (dir === 'under' && current > target) return 'fail';
  return 'pending';
}

function evalOverall(bet) {
  if (!bet.conditions?.length) return 'pending';
  const statuses = bet.conditions.map(c => condStatus(c));
  if (statuses.every(s => s === 'ok')) return 'won';
  if (statuses.some(s => s === 'fail')) return 'lost';
  if (statuses.some(s => s === 'pending')) return 'pending';
  return statuses.filter(s => s === 'ok').length > 0 ? 'partial' : 'pending';
}

async function launchApp(username, uid) {
  currentUser = uid;
  favIds = loadFavIds();
  bets = loadBets();

  setTimeout(()=>{
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    if(savedKey) {
      document.getElementById('apiKeyInput').value = savedKey;
      apiKey = savedKey;
    }
    init();
    if(savedKey) setTimeout(() => connectAPI(), 500);
  }, 300);
}

  location.reload();
}

async function testProxy() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if(!key) { toast('Ingresa tu API Key primero'); return; }
  apiKey = key;
  
  document.getElementById('debugPanel').innerHTML = '';
  document.getElementById('debugPanel').style.display = 'block';
  
  addDebug('🔍 Probando proxy: ' + PROXY_URL, 'info');
  addDebug('API Key: ' + key.substring(0,8) + '...', 'info');
  
  const testPath = 'status';
  const url = PROXY_URL + '?path=' + encodeURIComponent(testPath) + '&token=' + encodeURIComponent(apiKey);
  addDebug('URL: ' + url.substring(0, 70) + '...', 'info');
  
  try {
    const res = await fetch(url);
    addDebug('Respuesta HTTP: ' + res.status, res.ok ? 'success' : 'error');
    
    const data = await res.json();
    addDebug('Datos: ' + JSON.stringify(data).substring(0, 300), 'info');
    
    if(data.response) {
      addDebug('✅ PROXY FUNCIONA! Llamadas restantes: ' + data.response.requests.remaining, 'success');
      toast('✅ Proxy funciona correctamente');
    } else {
      addDebug('❌ Error: ' + JSON.stringify(data.errors || data), 'error');
    }
  } catch(e) {
    addDebug('❌ Error de red: ' + e.message, 'error');
  }
}

async function connectAPI() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if(!key) { toast('Ingresa tu API Key'); return; }
  
  apiKey = key;
  setApiStatus('loading', 'Conectando...');
  
  try {
    const url = PROXY_URL + '?path=' + encodeURIComponent('status') + '&token=' + encodeURIComponent(apiKey);
    const res = await fetch(url);
    const data = await res.json();
    
    if(data.response) {
      const remaining = data.response.requests.remaining || '?';
      setApiStatus('live', `✅ Conectado - ${remaining} llamadas`);
      saveApiKey(apiKey);
      toast('✅ ¡Conexión exitosa! Cargando partidos...');
      await loadAllMatches();
    } else {
      setApiStatus('err', '❌ API Key inválida');
      toast('API Key inválida');
    }
  } catch(e) {
    setApiStatus('err', '❌ Error de conexión');
    toast('Error de conexión');
  }
}

async function loadAllMatches() {
  setApiStatus('loading', 'Cargando partidos...');
  
  const today = new Date().toISOString().split('T')[0];
  const nowMonth = new Date().getMonth() + 1;
  const nowYear = new Date().getFullYear();
  const SEASON = nowMonth >= 8 ? nowYear : nowYear - 1;
  
  const allMatches = [];
  
  for(const league of LEAGUES) {
    try {
      const path = `fixtures?league=${league.id}&season=${SEASON}&date=${today}`;
      const url = PROXY_URL + '?path=' + encodeURIComponent(path) + '&token=' + encodeURIComponent(apiKey);
      const res = await fetch(url);
      const data = await res.json();
      
      if(data.response && data.response.length > 0) {
        allMatches.push(...data.response.map(f => ({...f, _liga: league.liga, _leagueName: league.name})));
      }
    } catch(e) {
      console.warn('Error cargando liga:', league.name);
    }
  }
  
  matches = allMatches.map(mapAPIFixture).filter(Boolean);
  
  // Si no hay partidos hoy, cargar los de ayer
  if(matches.length === 0) {
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    
    for(const league of LEAGUES.slice(0, 5)) {
      try {
        const path = `fixtures?league=${league.id}&season=${SEASON}&date=${yesterday}`;
        const url = PROXY_URL + '?path=' + encodeURIComponent(path) + '&token=' + encodeURIComponent(apiKey);
        const res = await fetch(url);
        const data = await res.json();
        if(data.response) {
          allMatches.push(...data.response.map(f => ({...f, _liga: league.liga, _leagueName: league.name})));
        }
      } catch(e) {}
    }
    
    matches = allMatches.map(mapAPIFixture).filter(m => m.status === 'finished');
  }
  
  renderMatchesByStatus();
  setApiStatus('live', `✅ ${matches.length} partidos`);
  toast(`${matches.length} partidos cargados`);
  
  await loadUpcoming();
}

async function loadUpcoming() {
  const from = new Date().toISOString().split('T')[0];
  const to = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
  const nowMonth = new Date().getMonth() + 1;
  const nowYear = new Date().getFullYear();
  const SEASON = nowMonth >= 8 ? nowYear : nowYear - 1;
  
  const all = [];
  
  for(const league of LEAGUES) {
    try {
      const path = `fixtures?league=${league.id}&season=${SEASON}&from=${from}&to=${to}&status=NS`;
      const url = PROXY_URL + '?path=' + encodeURIComponent(path) + '&token=' + encodeURIComponent(apiKey);
      const res = await fetch(url);
      const data = await res.json();
      
      if(data.response) {
        all.push(...data.response.map(f => ({...f, _liga: league.liga, _leagueName: league.name})));
      }
    } catch(e) {}
  }
  
  upcomingList = all.slice(0, 40).map(mapAPIUpcoming);
  renderUpcoming();
}

function mapAPIFixture(f) {
  const status = mapAPIStatus(f.fixture.status.short);
  const sc = f.goals;
  const ht = f.score.halftime;
  
  return {
    id: 'f'+f.fixture.id,
    h: f.teams.home.name,
    a: f.teams.away.name,
    lg: f._leagueName,
    liga: f._liga,
    status: status,
    time: status === 'live' ? (f.fixture.status.elapsed + "'") : fmtTime(f.fixture.date),
    date: fmtDate(f.fixture.date),
    score: sc.home !== null ? {h: sc.home, a: sc.away} : null,
    ht: ht.home !== null ? {h: ht.home, a: ht.away} : null,
    stats: null
  };
}

function mapAPIUpcoming(f) {
  return {
    id: 'u'+f.fixture.id,
    h: f.teams.home.name,
    a: f.teams.away.name,
    lg: f._leagueName,
    liga: f._liga,
    date: fmtDate(f.fixture.date),
    time: fmtTime(f.fixture.date)
  };
}

function mapAPIStatus(s) {
  const map = {
    '1H': 'live', '2H': 'live', 'HT': 'live', 'LIVE': 'live',
    'FT': 'finished', 'AET': 'finished', 'PEN': 'finished',
    'NS': 'today', 'TBD': 'today', 'PST': 'today', 'CANC': 'today'
  };
  return map[s] || 'today';
}

function setApiStatus(state, msg) {
  const dot = document.getElementById('apiDot');
  dot.className = 'api-dot' + (state==='live'?' live': state==='err'?' err': ' loading');
  document.getElementById('apiStatus').textContent = msg;
}

function fmtTime(utc) { 
  if(!utc) return '--:--'; 
  return new Date(utc).toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' }); 
}
function fmtDate(utc) {
  if(!utc) return '';
  const d = new Date(utc);
  const days = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${days[d.getUTCDay()]} ${d.getUTCDate()} ${months[d.getUTCMonth()]}`;
}

function buildBetTracker(matchId, m) {
  const myBets = bets.filter(b=>b.matchId===matchId);
  let html = `<div class="bt-header">Mis Apuestas</div>`;
  html += myBets.map((b,i)=>buildBetEntryHtml(b,i)).join('');
  html += buildBetWizard(matchId, m);
  return html;
}

function buildBetEntryHtml(b, i) {
  const ov = evalOverall(b);
  return `<div class="bet-entry"><div class="bet-entry-h" onclick="toggleBetBody(this)"><div class="be-title">${b.desc||('Apuesta '+(i+1))}</div><div class="be-right"><div class="be-badge ${ov}">${ov==='won'?'GANADA':ov==='lost'?'PERDIDA':ov==='partial'?'PARCIAL':'PENDIENTE'}</div><span class="be-chev">▼</span></div></div><div class="bet-entry-b">${b.conditions.map(c=>buildCondRow(c)).join('')}</div></div>`;
}

function buildCondRow(c) {
  const st = condStatus(c);
  const pct = c.target>0 ? Math.min(100,Math.round(c.current/c.target*100)) : 0;
  return `<div class="cond-row"><div class="cond-status-icon ${st}">${st==='ok'?'✓':st==='fail'?'✗':'○'}</div><div class="cond-main"><div class="cond-text">${c.mktName}</div><div class="cond-sub">${c.dirLabel}</div><div class="cond-prog-labels"><span>Actual: ${c.current}</span><span>Target: ${c.target}</span></div><div class="cond-bar"><div class="cond-fill ${st}" style="width:${pct}%"></div></div></div><div class="cond-val ${st}">${c.current}/${c.target}</div></div>`;
}

function toggleBetBody(header) {
  const body = header.nextElementSibling;

function selectMarketOption(matchId, mktId, mktName, mktStat, row) {
  document.querySelectorAll('.wizard-option-row').forEach(r=>r.classList.remove('active'));
  row.classList.add('active');
  
  const m = matches.find(x=>x.id===matchId) || upcomingList.find(x=>x.id===matchId);
  if(!wizardState[matchId]) wizardState[matchId] = { conds: [] };
  wizardState[matchId].pendingMkt = { id: mktId, name: mktName, stat: mktStat };
  
  const container = document.getElementById('ouStep-'+matchId);
  const suggestions = OU_SUGGESTIONS[mktStat] || OU_SUGGESTIONS.default;
  const maxVal = mktStat?.includes('corners') ? 20 : (mktStat?.includes('cards') ? 10 : 8);
  
  container.innerHTML = `
    <div class="wizard-ou-step">
      <div class="wizard-ou-header"><div class="wizard-ou-title">${mktName}</div><span class="wizard-ou-close" onclick="closeOUStep('${matchId}')">✕</span></div>
      <div class="wizard-ou-subtitle">SELECCIONA LA LÍNEA</div>
      <div class="wizard-slider-container">
        <div class="wizard-slider-value" id="ouVal-${matchId}">2.5</div>
        <input type="range" class="wizard-slider" id="ouSlider-${matchId}" min="0.5" max="${maxVal}" step="0.5" value="2.5" oninput="document.getElementById('ouVal-${matchId}').textContent = this.value">
        <div class="wizard-slider-labels"><span>0.5</span><span>${maxVal}</span></div>
      </div>
      <div class="wizard-chips">${suggestions.map(v=>`<span class="wizard-chip" onclick="setSliderValue('${matchId}','${v}')">${v}</span>`).join('')}</div>
      <div class="wizard-ou-actions">
        <button class="wizard-btn-primary" onclick="addConditionNew('${matchId}','over')">OVER</button>
        <button class="wizard-btn-primary" onclick="addConditionNew('${matchId}','under')" style="background:var(--card); color:var(--text); border:1px solid var(--border)">UNDER</button>
        <button class="wizard-btn-secondary" onclick="closeOUStep('${matchId}')">Cancelar</button>
      </div>
    </div>
  `;
}

function setSliderValue(matchId, val) {
  const slider = document.getElementById('ouSlider-'+matchId);
  if(slider) { slider.value = val; document.getElementById('ouVal-'+matchId).textContent = val; }
}

function closeOUStep(matchId) {
  document.getElementById('ouStep-'+matchId).innerHTML = '';
  document.querySelectorAll('.wizard-option-row').forEach(r=>r.classList.remove('active'));
  const ws = wizardState[matchId];
  if(ws) ws.pendingMkt = null;
}

function addConditionNew(matchId, dir) {
  const ws = wizardState[matchId];
  if(!ws?.pendingMkt) { toast('Selecciona un mercado'); return; }
  
  const slider = document.getElementById('ouSlider-'+matchId);
  const val = slider ? parseFloat(slider.value) : 2.5;
  const mkt = ws.pendingMkt;
  const m = matches.find(x=>x.id===matchId) || upcomingList.find(x=>x.id===matchId);
  
  const dirLabel = (dir==='over'?'OVER ':'UNDER ') + val.toFixed(1);
  const current = m ? readStat(m, mkt.stat) : 0;
  
  if(!ws.conds) ws.conds = [];
  ws.conds.push({ mktId: mkt.id, mktName: mkt.name, dir, dirLabel, target: val, current, stat: mkt.stat, matchStatus: m?.status || 'today' });
  
  closeOUStep(matchId);
  ws.pendingMkt = null;
  renderAddedConds(matchId);
  toast('Condición agregada');
}

function renderAddedConds(matchId) {
  const ws = wizardState[matchId];
  const el = document.getElementById('aclist-'+matchId);
  if(!el) return;
  el.innerHTML = (ws?.conds || []).map((c,i)=>`
    <div class="wizard-cond-chip">
      <div class="wizard-cond-info"><div class="wizard-cond-name">${c.mktName}</div><div class="wizard-cond-detail">${c.dirLabel}</div></div>
      <span class="wizard-cond-remove" onclick="removeCondWiz('${matchId}',${i})">✕</span>
    </div>
  `).join('');
}

function removeCondWiz(matchId, i) {
  if(wizardState[matchId]?.conds) { wizardState[matchId].conds.splice(i,1); renderAddedConds(matchId); }
}

function saveBetWizard(matchId, h, a, lg, date) {
  const ws = wizardState[matchId];
  const descEl = document.getElementById('wd-'+matchId);
  const desc = (descEl?.value) || (h + ' vs ' + a);
  if(!ws?.conds?.length) { toast('Agrega al menos una condición'); return; }
  
  bets.push({ id: 'b'+Date.now(), matchId, h, a, lg, date, status: 'pending', desc, conditions: ws.conds.slice() });
  saveBets();
  wizardState[matchId] = {conds:[]};
  document.getElementById('matchModal').classList.remove('open');
  renderBets(); renderSummary();
  toast('✅ Apuesta guardada');
}

function buildBetWizard(matchId, m) {
  const wid = 'wiz-'+matchId;
  let html = `<button class="btn-new-bet" onclick="toggleWizard('${wid}')">+ Nueva Apuesta</button>`;
  html += `<div class="bet-wizard" id="${wid}">`;
  html += `<input class="wiz-input" id="wd-${matchId}" placeholder="Nombre de la apuesta" value="${(m?.h||'')} vs ${(m?.a||'')}">`;
  
  MARKET_CATEGORIES.forEach(cat => {
    html += `<div class="wizard-category"><div class="wizard-category-title">${cat.name}</div><div class="wizard-options-grid">`;
    cat.markets.forEach(mkt => {
      html += `<div class="wizard-option-row" onclick="selectMarketOption('${matchId}','${mkt.id}','${mkt.name}','${mkt.stat||''}', this)"><span class="wizard-option-name">${mkt.name}</span><span class="wizard-option-arrow">›</span></div>`;
    });
    html += `</div></div>`;
  });
  
  html += `<div id="ouStep-${matchId}"></div><div id="aclist-${matchId}" class="wizard-added-conds"></div>`;
  html += `<button class="btn-save-bet" onclick="saveBetWizard('${matchId}','${(m?.h||'').replace(/'/g,"\\'")}','${(m?.a||'').replace(/'/g,"\\'")}','${(m?.lg||'').replace(/'/g,"\\'")}','${(m?.date||'').replace(/'/g,"\\'")}')">Guardar Apuesta</button>`;
  html += `</div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════════════════════
// UPCOMING & BETS
// ═══════════════════════════════════════════════════════════════════════════
function renderUpcoming() {
  let filtered = upcomingList;
  if(currentUpFilter === 'fav') {
    const favNames = TEAMS.filter(t=>favIds.includes(t.id)).map(t=>t.name);
    filtered = upcomingList.filter(u=>favNames.includes(u.h)||favNames.includes(u.a));
  } else if(currentUpFilter !== 'all') {
    filtered = upcomingList.filter(u=>u.liga===currentUpFilter);
  }
  
  const container = document.getElementById('upcomingDiv');
  if(!filtered.length) { container.innerHTML = '<div class="empty-state">No hay partidos próximos</div>'; return; }
  container.innerHTML = filtered.map(u=>`<div class="urow" onclick="openMatchModal('${u.id}')"><div style="flex:1"><div class="uteams">${u.h} vs ${u.a}</div><div class="umeta">${u.lg}</div></div><div style="text-align:right"><div class="utime-big">${u.time}</div><div class="utime-date">${u.date}</div></div></div>`).join('');
}

function filterUp(filter, btn) {
  currentUpFilter = filter;
  document.querySelectorAll('#sec-proximos .ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderUpcoming();
}

function renderBets() {
  let filtered = bets;
  if(currentBetFilter !== 'all') filtered = bets.filter(b=>b.status===currentBetFilter);
  
  const container = document.getElementById('betsDiv');
  if(!filtered.length) { 
    container.innerHTML = '<div class="empty-state">No hay apuestas. ¡Crea una desde un partido!</div>'; 
    return; 
  }
  container.innerHTML = filtered.map(b=>{
    const ov = evalOverall(b);
    return `<div class="acard ${ov}"><div class="acard-h" onclick="toggleBetBody(this)"><div><div class="amatch">${b.h} vs ${b.a}</div><div class="ameta">${b.desc}</div></div><div class="be-badge ${ov}">${ov==='won'?'GANADA':ov==='lost'?'PERDIDA':ov==='partial'?'PARCIAL':'PENDIENTE'}</div></div><div class="acard-b">${b.conditions.map(c=>buildCondRow(c)).join('')}</div></div>`;
  }).join('');
}

function renderSummary() {
  const total = bets.length;
  const won = bets.filter(b=>evalOverall(b)==='won').length;
  const lost = bets.filter(b=>evalOverall(b)==='lost').length;
  const pending = bets.filter(b=>evalOverall(b)==='pending').length;
  document.getElementById('sumDiv').innerHTML = `
    <div class="sum-card"><div class="sum-val">${total}</div><div class="sum-lbl">Total</div></div>
    <div class="sum-card"><div class="sum-val g">${won}</div><div class="sum-lbl">Ganadas</div></div>
    <div class="sum-card"><div class="sum-val r">${lost}</div><div class="sum-lbl">Perdidas</div></div>
    <div class="sum-card"><div class="sum-val a">${pending}</div><div class="sum-lbl">Pendientes</div></div>
  `;
}

function filterBets(filter, btn) {
  currentBetFilter = filter;
  document.querySelectorAll('#sec-apuestas .ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBets();
}
