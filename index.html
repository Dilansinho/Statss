<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>STATSBET — Tracker de Apuestas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --bg2:#0e1119; --bg3:#131720; --card:#171d28; --card2:#1d2433;
  --border:#1f2840; --border2:#283350;
  --accent:#00d4ff; --adim:rgba(0,212,255,.1); --abright:rgba(0,212,255,.2);
  --green:#00e5a0; --gdim:rgba(0,229,160,.08); --gbright:rgba(0,229,160,.15);
  --red:#ff4560; --rdim:rgba(255,69,96,.08);
  --yellow:#f5c518; --ydim:rgba(245,197,24,.08);
  --orange:#ff8c42;
  --text:#dce3f0; --text2:#6b7a99; --text3:#3a4560;
  --mono:'DM Mono', monospace;
  --head:'Syne', sans-serif;
  --body:'DM Sans', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:14px; }
body { 
  background:var(--bg); color:var(--text); font-family:var(--body); 
  min-height:100vh; overflow-x:hidden; 
  -webkit-tap-highlight-color: transparent;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ═══════════════════════ LOGIN ═══════════════════════ */
#loginScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; z-index:2000;
  transition:opacity .4s;
}
.login-wrap { width:360px; max-width:94vw; }
.login-logo {
  font-family:var(--head); font-size:clamp(28px,8vw,32px); font-weight:800; letter-spacing:4px;
  text-align:center; margin-bottom:2px; color:var(--text);
}
.login-logo span { color:var(--accent); }
.login-tagline {
  text-align:center; font-family:var(--mono); font-size:10px; color:var(--text3);
  letter-spacing:3px; text-transform:uppercase; margin-bottom:36px;
}
.login-box {
  background:var(--card); border:1px solid var(--border2); border-radius:14px;
  padding:clamp(24px,6vw,36px) clamp(20px,5vw,32px); 
  box-shadow:0 0 80px rgba(0,212,255,.04);
}

/* ═══════════════════════ NAV ═══════════════════════ */
nav {
  background:var(--bg2); border-bottom:1px solid var(--border);
  height:52px; display:flex; align-items:center; justify-content:space-between;
  padding:0 clamp(10px,3vw,22px); position:sticky; top:0; z-index:100;
}
.nav-logo { 
  font-family:var(--head); font-size:clamp(14px,4vw,18px); 
  font-weight:800; letter-spacing:2px; 
}
.nav-logo span { color:var(--accent); }
.nav-tabs { display:flex; gap:2px; flex-wrap:wrap; }
.ntab {
  padding:5px clamp(6px,2vw,14px); border-radius:5px; font-family:var(--mono); 
  font-size:clamp(9px,2.5vw,11px); font-weight:500; letter-spacing:1px; 
  text-transform:uppercase; cursor:pointer; color:var(--text2); 
  border:none; background:none; transition:all .2s; white-space:nowrap;
}
.ntab:hover { color:var(--text); background:var(--bg3); }
.ntab.active { color:var(--accent); background:var(--adim); }
.nav-r { display:flex; align-items:center; gap:clamp(6px,2vw,14px); }
.nav-user { 
  font-family:var(--mono); font-size:clamp(8px,2vw,11px); 
  color:var(--text3); letter-spacing:1px; 
}
.nav-user b { color:var(--accent); }
.btn-out {
  background:none; border:1px solid var(--border); color:var(--text3); 
  padding:4px clamp(8px,2vw,12px); border-radius:5px; 
  font-family:var(--mono); font-size:clamp(8px,2vw,10px); 
  letter-spacing:1px; cursor:pointer; transition:all .2s; 
  text-transform:uppercase; white-space:nowrap;
}
.btn-out:hover { border-color:var(--red); color:var(--red); }

/* ═══════════════════════ API STATUS ═══════════════════════ */
.api-bar {
  background:var(--bg3); border-bottom:1px solid var(--border); 
  padding:6px clamp(10px,3vw,22px); display:flex; align-items:center; 
  gap:8px; font-family:var(--mono); font-size:9px; color:var(--text3); 
  letter-spacing:1px; flex-wrap:wrap;
}
.api-dot { width:6px; height:6px; border-radius:50%; background:var(--text3); flex-shrink:0; }
.api-dot.live { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
.api-dot.err { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.api-key-input {
  background:transparent; border:none; border-bottom:1px solid var(--border); 
  color:var(--accent); font-family:var(--mono); font-size:9px; 
  letter-spacing:1px; width:clamp(120px,30vw,240px); outline:none; padding:2px 0;
}
.btn-api { 
  padding:3px 8px; background:var(--adim); border:1px solid var(--accent); 
  color:var(--accent); border-radius:4px; font-family:var(--mono); 
  font-size:9px; cursor:pointer; letter-spacing:1px; transition:all .2s; 
}
.btn-api:hover { background:var(--accent); color:var(--bg); }

/* ═══════════════════════ LAYOUT ═══════════════════════ */
#app { display:none; }
main { 
  padding:clamp(10px,3vw,18px) clamp(12px,4vw,20px); 
  max-width:1440px; margin:0 auto; 
}
.sec { display:none; }
.sec.active { display:block; }
.grid2 { display:grid; grid-template-columns:270px 1fr; gap:16px; }

/* ═══════════════════════ SIDEBAR ═══════════════════════ */
.sidebar { display:flex; flex-direction:column; gap:12px; }
.scard { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.scard-h {
  padding:11px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.scard-title { font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:2px;
  text-transform:uppercase; color:var(--text2); }
.scard-b { padding:8px; }

.titem { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:7px;
  cursor:pointer; transition:background .15s; }
.titem:hover { background:var(--bg3); }
.ti-abbr {
  width:32px; height:32px; border-radius:6px; background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-family:var(--head);
  font-size:12px; font-weight:800; color:var(--accent); flex-shrink:0;
}
.ti-name { font-family:var(--head); font-size:13px; font-weight:700; line-height:1.2; }
.ti-lg { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; margin-top:2px; }
.ti-form { display:flex; gap:2px; margin-top:4px; flex-wrap:wrap; }
.fb { width:13px; height:13px; border-radius:2px; display:flex; align-items:center;
  justify-content:center; font-size:7px; font-weight:700; color:var(--bg); font-family:var(--mono); }
.fb.W { background:var(--green); }
.fb.D { background:var(--yellow); }
.fb.L { background:var(--red); }

/* ═══════════════════════ ESTADÍSTICAS DE EQUIPO MEJORADAS ═══════════════════════ */
.team-stats-container {
  padding:8px 4px;
}
.team-stat-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 12px; border-bottom:1px solid var(--border);
}
.team-stat-row:last-child { border-bottom:none; }
.team-stat-label {
  font-family:var(--mono); font-size:11px; color:var(--text2); 
  letter-spacing:1px; text-transform:uppercase;
}
.team-stat-value {
  font-family:var(--head); font-size:20px; font-weight:800;
}
.team-stat-bar-container {
  padding:6px 12px 12px;
}
.team-stat-bar-label {
  display:flex; justify-content:space-between;
  font-family:var(--mono); font-size:9px; color:var(--text3);
  margin-bottom:4px;
}
.team-stat-bar {
  height:6px; background:var(--border); border-radius:3px; overflow:hidden;
}
.team-stat-bar-fill {
  height:100%; border-radius:3px; transition:width .5s;
}
.team-form-container {
  padding:12px; display:flex; gap:6px; flex-wrap:wrap;
}
.team-form-badge {
  width:32px; height:32px; border-radius:6px; display:flex; align-items:center;
  justify-content:center; font-family:var(--head); font-size:14px; font-weight:800;
}
.team-form-badge.W { background:var(--gdim); color:var(--green); border:1px solid rgba(0,229,160,.3); }
.team-form-badge.D { background:var(--ydim); color:var(--yellow); border:1px solid rgba(245,197,24,.3); }
.team-form-badge.L { background:var(--rdim); color:var(--red); border:1px solid rgba(255,69,96,.3); }

/* ═══════════════════════ WIZARD ESTILO BETANO ═══════════════════════ */
.wizard-category {
  margin-bottom:16px;
}
.wizard-category-title {
  font-family:var(--head); font-size:16px; font-weight:800; 
  color:var(--text); margin-bottom:10px; letter-spacing:.5px;
}
.wizard-options-grid {
  display:flex; flex-direction:column; gap:6px;
}
.wizard-option-row {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg3); border:1px solid var(--border); 
  border-radius:8px; padding:12px 14px; cursor:pointer;
  transition:all .15s;
}
.wizard-option-row:hover {
  border-color:var(--accent); background:var(--adim);
}
.wizard-option-left {
  display:flex; flex-direction:column; gap:2px;
}
.wizard-option-name {
  font-family:var(--head); font-size:14px; font-weight:700; color:var(--text);
}
.wizard-option-sub {
  font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:.5px;
}
.wizard-option-right {
  display:flex; align-items:center; gap:8px;
}
.wizard-option-arrow {
  color:var(--text3); font-size:14px;
}
.wizard-option-badge {
  background:var(--adim); color:var(--accent); padding:4px 8px;
  border-radius:4px; font-family:var(--mono); font-size:10px; font-weight:600;
}

/* OU Step dentro del wizard */
.wizard-ou-step {
  background:var(--card); border:1px solid var(--border2); 
  border-radius:10px; padding:16px; margin-top:12px;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.wizard-ou-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.wizard-ou-title {
  font-family:var(--head); font-size:15px; font-weight:800; color:var(--text);
}
.wizard-ou-close {
  color:var(--text3); cursor:pointer; font-size:16px; padding:4px 8px;
}
.wizard-ou-subtitle {
  font-family:var(--mono); font-size:10px; color:var(--accent); 
  letter-spacing:1px; text-transform:uppercase; margin-bottom:16px;
}
.wizard-slider-container {
  padding:8px 0;
}
.wizard-slider-value {
  text-align:center; font-family:var(--head); font-size:36px; font-weight:800;
  color:var(--accent); margin-bottom:12px;
}
.wizard-slider {
  width:100%; accent-color:var(--accent); height:5px;
  -webkit-appearance:none; background:var(--border); border-radius:3px;
}
.wizard-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:24px; height:24px; 
  background:var(--accent); border-radius:50%; cursor:pointer;
  box-shadow:0 0 15px var(--accent);
}
.wizard-slider-labels {
  display:flex; justify-content:space-between;
  font-family:var(--mono); font-size:10px; color:var(--text3);
  margin-top:6px;
}
.wizard-chips {
  display:flex; gap:8px; flex-wrap:wrap; margin:16px 0;
}
.wizard-chip {
  padding:8px 16px; background:var(--bg3); border:1px solid var(--border);
  border-radius:20px; color:var(--text2); font-family:var(--mono);
  font-size:13px; font-weight:500; cursor:pointer; transition:all .15s;
}
.wizard-chip:hover {
  border-color:var(--accent); color:var(--accent); background:var(--adim);
}
.wizard-ou-actions {
  display:flex; gap:8px; margin-top:20px;
}
.wizard-btn-primary {
  flex:1; padding:14px; background:var(--accent); color:var(--bg);
  font-family:var(--head); font-size:14px; font-weight:800; 
  letter-spacing:1.5px; border:none; border-radius:8px; cursor:pointer;
  text-transform:uppercase; transition:opacity .2s;
}
.wizard-btn-primary:hover { opacity:.85; }
.wizard-btn-secondary {
  padding:14px 20px; background:none; border:1px solid var(--border);
  border-radius:8px; color:var(--text3); font-family:var(--mono);
  font-size:11px; cursor:pointer; transition:all .2s;
}
.wizard-btn-secondary:hover { border-color:var(--red); color:var(--red); }

/* Condiciones agregadas */
.wizard-added-conds {
  margin:12px 0;
}
.wizard-cond-chip {
  display:flex; align-items:center; gap:10px; padding:12px 14px;
  background:var(--card2); border:1px solid var(--border2); 
  border-radius:8px; margin-bottom:6px;
}
.wizard-cond-info { flex:1; }
.wizard-cond-name {
  font-family:var(--head); font-size:13px; font-weight:700; color:var(--text);
}
.wizard-cond-detail {
  font-family:var(--mono); font-size:10px; color:var(--text3); 
  margin-top:2px; letter-spacing:.5px;
}
.wizard-cond-remove {
  color:var(--text3); cursor:pointer; font-size:16px; padding:6px;
}
.wizard-cond-remove:hover { color:var(--red); }

.btn-save-bet {
  width:100%; padding:14px; margin-top:16px; background:var(--accent); 
  color:var(--bg); font-family:var(--head); font-size:15px; font-weight:800; 
  letter-spacing:2px; border:none; border-radius:8px; cursor:pointer; 
  transition:opacity .2s; text-transform:uppercase;
}
.btn-save-bet:hover { opacity:.85; }

/* ═══════════════════════ MATCH CARDS ═══════════════════════ */
.mcol { display:flex; flex-direction:column; gap:clamp(8px,2vw,12px); }
.sh {
  font-family:var(--mono); font-size:clamp(9px,2.5vw,10px); font-weight:500; 
  letter-spacing:2px; color:var(--text3); text-transform:uppercase; 
  margin-bottom:6px; display:flex; align-items:center; gap:8px;
}
.sh::after { content:''; flex:1; height:1px; background:var(--border); }

.mcard {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  overflow:hidden; cursor:pointer; transition:border-color .2s, background .2s;
}
.mcard:hover { border-color:var(--border2); background:var(--card2); }
.mcard.live { border-color:rgba(255,69,96,.3); }
.mcard-top {
  padding:8px 12px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.mc-league { 
  font-family:var(--mono); font-size:clamp(7px,2vw,9px); color:var(--text3); 
  letter-spacing:1px; text-transform:uppercase; 
}
.mc-time { font-family:var(--mono); font-size:clamp(9px,2.5vw,11px); color:var(--text2); }
.live-badge {
  background:var(--rdim); color:var(--red); padding:2px 6px; border-radius:3px;
  font-family:var(--mono); font-size:clamp(8px,2vw,10px); font-weight:500; 
  letter-spacing:1px; border:1px solid rgba(255,69,96,.2);
}
.mcard-body { 
  padding:clamp(8px,2vw,10px) clamp(10px,3vw,14px) clamp(10px,2.5vw,12px); 
  display:flex; align-items:center; gap:6px; 
}
.mteam { flex:1; }
.mteam-name { 
  font-family:var(--head); font-size:clamp(14px,4vw,18px); 
  font-weight:800; line-height:1.1; 
}
.mscore {
  text-align:center; min-width:clamp(40px,12vw,56px); 
  font-family:var(--head); font-size:clamp(20px,6vw,28px); font-weight:800;
}
.mscore.vs { font-size:clamp(10px,3vw,12px); color:var(--text3); font-family:var(--mono); letter-spacing:2px; }

/* ═══════════════════════ MODAL ═══════════════════════ */
.modal-ov {
  position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:500;
  display:flex; align-items:flex-end; justify-content:center; opacity:0;
  pointer-events:none; transition:opacity .25s; backdrop-filter:blur(8px);
}
@media (min-width:640px) {
  .modal-ov { align-items:center; }
}
.modal-ov.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--card); border:1px solid var(--border2); 
  border-radius:clamp(12px,3vw,14px) clamp(12px,3vw,14px) 0 0;
  width:100%; max-width:640px; max-height:85vh; overflow-y:auto;
  transform:translateY(16px); transition:transform .25s;
  box-shadow:0 -4px 30px rgba(0,0,0,.5);
}
@media (min-width:640px) {
  .modal { border-radius:14px; width:640px; max-width:96vw; }
}
.modal-ov.open .modal { transform:translateY(0); }
.modal-h {
  padding:clamp(14px,4vw,16px) clamp(16px,4vw,20px) clamp(10px,3vw,12px);
  border-bottom:1px solid var(--border); display:flex; align-items:center; 
  justify-content:space-between; position:sticky; top:0; 
  background:var(--card); z-index:2;
}
.modal-title { 
  font-family:var(--head); font-size:clamp(16px,4.5vw,18px); 
  font-weight:800; letter-spacing:1px; 
}
.mclose { 
  background:none; border:none; color:var(--text3); font-size:22px; 
  cursor:pointer; transition:color .2s; line-height:1; 
  font-family:var(--mono); padding:8px; margin:-8px;
}
.mclose:hover { color:var(--text); }
.modal-b { padding:clamp(14px,4vw,18px) clamp(14px,4vw,20px); }

/* Score Block */
.score-block {
  background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:clamp(14px,4vw,20px); margin-bottom:16px; text-align:center;
}
.score-row { 
  display:flex; align-items:center; justify-content:center; 
  gap:clamp(10px,3vw,20px); margin-bottom:8px; 
}
.score-team-name { 
  font-family:var(--head); font-size:clamp(16px,4.5vw,20px); 
  font-weight:800; flex:1; word-break:break-word;
}
.score-num { 
  font-family:var(--head); font-size:clamp(36px,10vw,48px); 
  font-weight:800; min-width:70px; text-align:center; line-height:1; 
}

/* Bet entries */
.bt-header {
  font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:2px; 
  color:var(--text2); text-transform:uppercase; margin-bottom:12px; 
  padding-top:16px; border-top:1px solid var(--border); margin-top:16px;
}
.bet-entry { background:var(--bg3); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; overflow:hidden; }
.bet-entry-h {
  padding:12px 14px; display:flex; align-items:center; justify-content:space-between;
  cursor:pointer;
}
.be-title { font-family:var(--head); font-size:14px; font-weight:700; }
.be-badge {
  padding:3px 8px; border-radius:3px; font-family:var(--mono); font-size:9px;
  font-weight:500; letter-spacing:1.5px; text-transform:uppercase;
}
.be-badge.won { background:var(--gdim); color:var(--green); }
.be-badge.lost { background:var(--rdim); color:var(--red); }
.be-badge.pending { background:var(--ydim); color:var(--yellow); }

/* Upcoming */
.urow {
  display:flex; align-items:center; gap:10px; padding:12px 14px; 
  background:var(--card); border:1px solid var(--border); border-radius:10px; 
  margin-bottom:8px; cursor:pointer;
}
.uteams { 
  font-family:var(--head); font-size:clamp(14px,4vw,17px); font-weight:800; 
}
.umeta { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
.utime-big { font-family:var(--mono); font-size:clamp(13px,3.5vw,17px); font-weight:500; color:var(--accent); text-align:right; }

/* Filter tabs */
.ftabs { display:flex; gap:3px; margin-bottom:12px; flex-wrap:wrap; }
.ftab {
  padding:6px 10px; background:var(--card); border:1px solid var(--border); 
  border-radius:5px; color:var(--text3); font-family:var(--mono); 
  font-size:9px; font-weight:500; cursor:pointer; transition:all .2s; 
  letter-spacing:1px; text-transform:uppercase;
}
.ftab.active, .ftab:hover { border-color:var(--accent); color:var(--accent); background:var(--adim); }

/* Toast */
.toast {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  background:var(--card2); border:1px solid var(--border2); padding:12px 20px;
  border-radius:8px; font-family:var(--mono); font-size:11px; z-index:9000;
  box-shadow:0 4px 20px rgba(0,0,0,.5); max-width:90vw; text-align:center;
}

function toast(msg, duration = 3000) {
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = msg;

function readStat(match, statId) {
  if (!match) return 0;
  const s = match.stats || {};
  const sc = match.score || { h: 0, a: 0 };
  const statMap = {
    'goals_total': () => (sc.h || 0) + (sc.a || 0),
    'goals_home': () => sc.h || 0,
    'goals_away': () => sc.a || 0,
    'corners_total': () => (s.corners?.h || 0) + (s.corners?.a || 0),
    'corners_home': () => s.corners?.h || 0,
    'corners_away': () => s.corners?.a || 0,
    'cards_total': () => (s.cards?.h || 0) + (s.cards?.a || 0),
    'cards_home': () => s.cards?.h || 0,
    'cards_away': () => s.cards?.a || 0,
  };
  const fn = statMap[statId];
  return fn ? fn() : 0;
}

function condStatus(c) {
  const current = c.current || 0;
  const target = c.target || 0;
  const dir = c.dir || 'over';
  const matchStatus = c.matchStatus || 'today';
  
  if (matchStatus === 'finished') {
    if (dir === 'over') return current >= target ? 'ok' : 'fail';
    if (dir === 'under') return current <= target ? 'ok' : 'fail';
  }
  if (dir === 'over' && current >= target) return 'ok';
  if (dir === 'under' && current > target) return 'fail';
  return 'pending';
}

function evalOverall(bet) {
  if (!bet.conditions?.length) return 'pending';
  const statuses = bet.conditions.map(c => condStatus(c));
  if (statuses.every(s => s === 'ok')) return 'won';
  if (statuses.some(s => s === 'fail')) return 'lost';
  if (statuses.some(s => s === 'pending')) return 'pending';
  const okCount = statuses.filter(s => s === 'ok').length;
  return okCount > 0 ? 'partial' : 'pending';
}

  const testPath = 'competitions/PL/matches?status=SCHEDULED&dateFrom='+today()+'&dateTo='+today();
  
  try {
    const proxyUrl = PROXY_URLS[0];
    const url = proxyUrl + encodeURIComponent('https://api.football-data.org/v4/' + testPath);
    const res = await fetch(url);
    if (res.ok) {
      activeProxyIndex = 0;
      setApiStatus('live', '✅ Conectado');
      saveApiKey(apiKey);
      await loadRealMatches();
      toast('Conexión exitosa');
    }
  } catch(e) {
    setApiStatus('err', 'Error de conexión');
  }
}

function today() { return new Date().toISOString().split('T')[0]; }
function nxtWeek() { const d = new Date(); d.setDate(d.getDate() + 7); return d.toISOString().split('T')[0]; }

function setApiStatus(state, msg) {
  const dot = document.getElementById('apiDot');
  const st  = document.getElementById('apiStatus');
  dot.className = 'api-dot' + (state==='live'?' live': state==='err'?' err':'');
  st.textContent = msg;
}

async function loadRealMatches() {
  const t = today();
  const allMatches = [];
  for (const { code, liga } of FD_COMPS) {
    try {
      const path = `competitions/${code}/matches?dateFrom=${t}&dateTo=${t}`;
      const url = PROXY_URLS[0] + encodeURIComponent('https://api.football-data.org/v4/' + path);
      const res = await fetch(url);
      const data = await res.json();
      if (data.matches) allMatches.push(...data.matches.map(m => ({...m, _liga: liga})));
    } catch(e) {}
  }
  if (allMatches.length) {
    matches = allMatches.map(mapFD).filter(Boolean);
    renderMatchesByStatus();
  }
  await loadUpcoming();
}

async function loadUpcoming() {
  const from = today(), to = nxtWeek();
  const all = [];
  for (const { code, liga } of FD_COMPS) {
    try {
      const path = `competitions/${code}/matches?status=SCHEDULED&dateFrom=${from}&dateTo=${to}`;
      const url = PROXY_URLS[0] + encodeURIComponent('https://api.football-data.org/v4/' + path);
      const res = await fetch(url);
      const data = await res.json();
      if (data.matches) all.push(...data.matches.map(m => ({...m, _liga: liga})));
    } catch(e) {}
  }
  if (all.length) {
    upcomingList = all.slice(0,30).map(m => ({
      id: 'u' + m.id, h: m.homeTeam.shortName || m.homeTeam.name,
      a: m.awayTeam.shortName || m.awayTeam.name, lg: m.competition.name,
      liga: m._liga || 'other', date: fmtDate(m.utcDate), time: fmtTime(m.utcDate),
    }));
    renderUpcoming();
  }
}

function mapFD(m) {
  const status = ['IN_PLAY','PAUSED','LIVE'].includes(m.status) ? 'live' : (m.status === 'FINISHED' ? 'finished' : 'today');
  const sc = m.score.fullTime;
  return {
    id: 'fd' + m.id, h: m.homeTeam.shortName || m.homeTeam.name,
    a: m.awayTeam.shortName || m.awayTeam.name, lg: m.competition.name,
    liga: m._liga || 'other', status,
    time: status === 'live' ? (m.minute ? m.minute + "'" : 'EN VIVO') : fmtTime(m.utcDate),
    date: fmtDate(m.utcDate),
    score: sc.home !== null ? { h: sc.home, a: sc.away } : null,
    stats: null,
  };
}

function fmtTime(utc) {
  if(!utc) return '--:--';
  return new Date(utc).toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });
}
function fmtDate(utc) {
  if(!utc) return '';
  const d = new Date(utc);
  return `${['Dom','Lun','Mar','Mie','Jue','Vie','Sab'][d.getDay()]} ${d.getDate()} ${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]}`;
}

function openMatchModal(id) {
  const m = matches.find(x=>x.id===id) || upcomingList.find(x=>x.id===id);
  if(!m) return;
  if(!matches.find(x=>x.id===id)) matches.push({...m, status:'upcoming', score:null, stats:null});

  document.getElementById('mmTitle').textContent = m.h + ' vs ' + m.a;
  let html = buildScoreBlock(m);
  html += buildBetTracker(id, m);
  document.getElementById('mmBody').innerHTML = html;
  document.getElementById('matchModal').classList.add('open');
}

function buildScoreBlock(m) {
  if(m.score) {
    return `<div class="score-block">
      <div class="score-row"><div class="score-team-name">${m.h}</div><div class="score-num">${m.score.h}-${m.score.a}</div><div class="score-team-name away">${m.a}</div></div>
      <div class="score-meta">${m.lg} — ${m.date}</div>
    </div>`;
  }
  return `<div class="score-block">
    <div class="score-row"><div class="score-team-name">${m.h}</div><div class="score-num" style="color:var(--text3);font-size:24px">VS</div><div class="score-team-name away">${m.a}</div></div>
    <div class="score-meta">${m.lg} — ${m.date} — ${m.time}</div>

}

function buildBetTracker(matchId, m) {
  const myBets = bets.filter(b=>b.matchId===matchId);
  let html = `<div class="bt-header">Mis Apuestas</div>`;
  html += myBets.map((b,i)=>buildBetEntryHtml(b,i)).join('');
  html += buildBetWizard(matchId, m);
  return html;
}

function buildBetEntryHtml(b, i) {
  const ov = evalOverall(b);
  return `
  <div class="bet-entry">
    <div class="bet-entry-h" onclick="toggleBetBody(this)">
      <div class="be-title">${b.desc||('Apuesta '+(i+1))}</div>
      <div class="be-badge ${ov}">${ov==='won'?'GANADA':ov==='lost'?'PERDIDA':'PENDIENTE'}</div>
    </div>
    <div class="bet-entry-b" style="display:none">
      ${b.conditions.map(c=>buildCondRow(c)).join('')}
    </div>
  </div>`;
}

function buildCondRow(c) {
  const st = condStatus(c);
  const pct = c.target>0 ? Math.min(100,Math.round(c.current/c.target*100)) : 0;
  return `
  <div class="cond-row">
    <div class="cond-status-icon ${st}">${st==='ok'?'✓':st==='fail'?'✗':'○'}</div>
    <div class="cond-main">
      <div class="cond-text">${c.mktName}</div>
      <div class="cond-sub">${c.dirLabel}</div>
      <div class="cond-prog-labels"><span>Actual: ${c.current}</span><span>Target: ${c.target}</span></div>
      <div class="cond-bar"><div class="cond-fill ${st}" style="width:${pct}%"></div></div>
    </div>
    <div class="cond-val ${st}">${c.current}/${c.target}</div>
  </div>`;
}

function toggleBetBody(header) {
  const body = header.nextElementSibling;
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

function toggleWizard(id) {
  const el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function selectMarketOption(matchId, mktId, mktName, mktType, mktStat) {
  const m = matches.find(x=>x.id===matchId) || upcomingList.find(x=>x.id===matchId);
  const homeTeam = m?.h || 'Local';
  const awayTeam = m?.a || 'Visitante';
  
  if(!wizardState[matchId]) wizardState[matchId] = { conds: [] };
  const ws = wizardState[matchId];
  
  ws.pendingMkt = { id: mktId, name: mktName, type: mktType, stat: mktStat };
  
  // Mostrar paso OU
  showOUStepNew(matchId, mktName, mktStat, homeTeam, awayTeam);
}

function showOUStepNew(matchId, mktName, mktStat, homeTeam, awayTeam) {
  const container = document.getElementById('ouStep-'+matchId);
  const suggestions = OU_SUGGESTIONS[mktStat] || OU_SUGGESTIONS.default;
  const maxVal = mktStat?.includes('corners') ? 20 : (mktStat?.includes('cards') ? 10 : 8);
  
  let displayName = mktName;
  if (mktName.includes('Local')) displayName = homeTeam + ' ' + mktName.replace('Local','').trim();
  else if (mktName.includes('Visitante')) displayName = awayTeam + ' ' + mktName.replace('Visitante','').trim();
  
  container.innerHTML = `
    <div class="wizard-ou-step">
      <div class="wizard-ou-header">
        <div class="wizard-ou-title">${displayName}</div>
        <span class="wizard-ou-close" onclick="closeOUStep('${matchId}')">✕</span>
      </div>
      <div class="wizard-ou-subtitle">Selecciona la línea</div>
      <div class="wizard-slider-container">
        <div class="wizard-slider-value" id="ouVal-${matchId}">2.5</div>
        <input type="range" class="wizard-slider" id="ouSlider-${matchId}" 
               min="0.5" max="${maxVal}" step="0.5" value="2.5" 
               oninput="document.getElementById('ouVal-${matchId}').textContent = this.value">
        <div class="wizard-slider-labels">
          <span>0.5</span><span>${maxVal}</span>
        </div>
      </div>
      <div class="wizard-chips">
        ${suggestions.map(v => `<span class="wizard-chip" onclick="setSliderValue('${matchId}', '${v}')">${v}</span>`).join('')}
      </div>
      <div class="wizard-ou-actions">
        <button class="wizard-btn-primary" onclick="addConditionNew('${matchId}', 'over')">OVER</button>
        <button class="wizard-btn-primary" onclick="addConditionNew('${matchId}', 'under')" style="background:var(--card); color:var(--text); border:1px solid var(--border)">UNDER</button>
        <button class="wizard-btn-secondary" onclick="closeOUStep('${matchId}')">Cancelar</button>
      </div>
    </div>
  `;
}

function setSliderValue(matchId, val) {
  const slider = document.getElementById('ouSlider-'+matchId);
  const display = document.getElementById('ouVal-'+matchId);
  if(slider) { slider.value = val; display.textContent = val; }
}

function closeOUStep(matchId) {
  document.getElementById('ouStep-'+matchId).innerHTML = '';
  const ws = wizardState[matchId];
  if(ws) ws.pendingMkt = null;
}

function addConditionNew(matchId, dir) {
  const ws = wizardState[matchId];
  if(!ws?.pendingMkt) { toast('Selecciona un mercado'); return; }
  
  const slider = document.getElementById('ouSlider-'+matchId);
  const val = slider ? parseFloat(slider.value) : 2.5;
  const mkt = ws.pendingMkt;
  const m = matches.find(x=>x.id===matchId) || upcomingList.find(x=>x.id===matchId);
  const homeTeam = m?.h || 'Local';
  const awayTeam = m?.a || 'Visitante';
  
  let dirLabel = (dir==='over'?'OVER ':'UNDER ') + val.toFixed(1);
  if (mkt.name.includes('Local')) dirLabel = homeTeam + ' ' + dirLabel;
  else if (mkt.name.includes('Visitante')) dirLabel = awayTeam + ' ' + dirLabel;
  
  const current = m ? readStat(m, mkt.stat) : 0;
  
  if(!ws.conds) ws.conds = [];
  ws.conds.push({
    mktId: mkt.id, mktName: mkt.name, dir, dirLabel,
    target: val, current, stat: mkt.stat, matchStatus: m?.status || 'today'
  });
  
  closeOUStep(matchId);
  ws.pendingMkt = null;
  renderAddedCondsNew(matchId);
  toast('Condición agregada');
}

function renderAddedCondsNew(matchId) {
  const ws = wizardState[matchId];
  const el = document.getElementById('aclist-'+matchId);
  if(!el) return;
  let html = '';
  (ws?.conds || []).forEach((c, i) => {
    html += `<div class="wizard-cond-chip">
      <div class="wizard-cond-info">
        <div class="wizard-cond-name">${c.mktName}</div>
        <div class="wizard-cond-detail">${c.dirLabel}</div>
      </div>
      <span class="wizard-cond-remove" onclick="removeCondWiz('${matchId}',${i})">✕</span>
    </div>`;
  });
  el.innerHTML = html;
}

function removeCondWiz(matchId, i) {
  if(wizardState[matchId]?.conds) {
    wizardState[matchId].conds.splice(i, 1);
    renderAddedCondsNew(matchId);
  }
}

function saveBetWizard(matchId, h, a, lg, date) {
  const ws = wizardState[matchId];
  const descEl = document.getElementById('wd-'+matchId);
  const desc = (descEl?.value) || (h + ' vs ' + a);
  
  if(!ws?.conds?.length) { toast('Agrega al menos una condición'); return; }
  
  const newBet = {
    id: 'b'+Date.now(), matchId, h, a, lg, date,
    status: 'pending', desc, conditions: ws.conds.slice()
  };
  bets.push(newBet);
  saveBets();
  wizardState[matchId] = {conds:[]};
  
  document.getElementById('matchModal').classList.remove('open');
  renderBets();
  renderSummary();
  toast('✅ Apuesta guardada');
}

function buildBetWizard(matchId, m) {
  const wid = 'wiz-'+matchId;
  const mh = (m?.h||'').replace(/'/g,"\\'");
  const ma = (m?.a||'').replace(/'/g,"\\'");
  const ml = (m?.lg||'').replace(/'/g,"\\'");
  const md = (m?.date||'').replace(/'/g,"\\'");
  
  let html = `<button class="btn-new-bet" onclick="toggleWizard('${wid}')">+ Nueva Apuesta</button>`;
  html += `<div class="bet-wizard" id="${wid}">`;
  html += `<input class="wiz-input" id="wd-${matchId}" placeholder="Nombre de la apuesta" value="${mh} vs ${ma}">`;
  
  MARKET_CATEGORIES.forEach(cat => {
    html += `<div class="wizard-category">`;
    html += `<div class="wizard-category-title">${cat.name}</div>`;
    html += `<div class="wizard-options-grid">`;
    
    cat.markets.forEach(mkt => {
      html += `<div class="wizard-option-row" onclick="selectMarketOption('${matchId}','${mkt.id}','${mkt.name}','${mkt.type}','${mkt.stat||''}')">`;
      html += `<div class="wizard-option-left">`;
      html += `<span class="wizard-option-name">${mkt.name}</span>`;
      html += `</div>`;
      html += `<div class="wizard-option-right">`;
      html += `<span class="wizard-option-arrow">›</span>`;
      html += `</div>`;
      html += `</div>`;
    });
    
    html += `</div></div>`;
  });
  
  html += `<div id="ouStep-${matchId}"></div>`;
  html += `<div id="aclist-${matchId}" class="wizard-added-conds"></div>`;
  html += `<button class="btn-save-bet" onclick="saveBetWizard('${matchId}','${mh}','${ma}','${ml}','${md}')">Guardar Apuesta</button>`;
  html += `</div>`;
  
  return html;
}

// ═══════════════════════════════════════════════════════════════════════════
// UPCOMING & BETS
// ═══════════════════════════════════════════════════════════════════════════
function renderUpcoming() {
  const container = document.getElementById('upcomingDiv');
  let filtered = upcomingList;
  if(currentUpFilter === 'fav') {
    const favNames = TEAMS.filter(t => favIds.includes(t.id)).map(t => t.name);
    filtered = upcomingList.filter(u => favNames.includes(u.h) || favNames.includes(u.a));
  } else if(currentUpFilter !== 'all') {
    filtered = upcomingList.filter(u => u.liga === currentUpFilter);
  }
  if(!filtered.length) {
    container.innerHTML = '<div class="empty-state">No hay partidos</div>';
    return;
  }
  container.innerHTML = filtered.map(u => `
    <div class="urow" onclick="openMatchModal('${u.id}')">
      <div style="flex:1"><div class="uteams">${u.h} vs ${u.a}</div><div class="umeta">${u.lg}</div></div>
      <div style="text-align:right"><div class="utime-big">${u.time}</div><div class="utime-date">${u.date}</div></div>
    </div>
  `).join('');
}

function filterUp(filter, btn) {
  currentUpFilter = filter;
  document.querySelectorAll('#sec-proximos .ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderUpcoming();
}

function renderBets() {
  const container = document.getElementById('betsDiv');
  let filtered = bets;
  if(currentBetFilter !== 'all') filtered = bets.filter(b => b.status === currentBetFilter);
  
  if(!filtered.length) {
    container.innerHTML = '<div class="empty-state">No hay apuestas</div>';
    return;
  }
  container.innerHTML = filtered.map(b => {
    const ov = evalOverall(b);
    return `
      <div class="acard ${ov}">
        <div class="acard-h" onclick="toggleBetBody(this)">
          <div><div class="amatch">${b.h} vs ${b.a}</div><div class="ameta">${b.desc}</div></div>
          <div class="be-badge ${ov}">${ov==='won'?'GANADA':ov==='lost'?'PERDIDA':'PENDIENTE'}</div>
        </div>
        <div class="acard-b" style="display:none">${b.conditions.map(c=>buildCondRow(c)).join('')}</div>
      </div>
    `;
  }).join('');
}

function renderSummary() {
  const total = bets.length;
  const won = bets.filter(b => evalOverall(b) === 'won').length;
  const lost = bets.filter(b => evalOverall(b) === 'lost').length;
  const pending = bets.filter(b => evalOverall(b) === 'pending').length;
  document.getElementById('sumDiv').innerHTML = `
    <div class="sum-card"><div class="sum-val">${total}</div><div class="sum-lbl">Total</div></div>
    <div class="sum-card"><div class="sum-val g">${won}</div><div class="sum-lbl">Ganadas</div></div>
    <div class="sum-card"><div class="sum-val r">${lost}</div><div class="sum-lbl">Perdidas</div></div>
    <div class="sum-card"><div class="sum-val a">${pending}</div><div class="sum-lbl">Pendientes</div></div>
  `;
}

function filterBets(filter, btn) {
  currentBetFilter = filter;
  document.querySelectorAll('#sec-apuestas .ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBets();
}
