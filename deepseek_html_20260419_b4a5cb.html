<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>STATSBET — Tracker de Apuestas</title>
<!-- Tipografía cómoda: Inter + Space Grotesk -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --bg2:#0e1119; --bg3:#131720; --card:#171d28; --card2:#1d2433;
  --border:#1f2840; --border2:#283350;
  --accent:#00d4ff; --adim:rgba(0,212,255,.1); --abright:rgba(0,212,255,.2);
  --green:#00e5a0; --gdim:rgba(0,229,160,.08); --gbright:rgba(0,229,160,.15);
  --red:#ff4560; --rdim:rgba(255,69,96,.08);
  --yellow:#f5c518; --ydim:rgba(245,197,24,.08);
  --orange:#ff8c42;
  --text:#dce3f0; --text2:#6b7a99; --text3:#3a4560;
  --mono:'Space Grotesk', monospace;
  --head:'Inter', sans-serif;
  --body:'Inter', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:15px; }
body { 
  background:var(--bg); color:var(--text); font-family:var(--body); 
  min-height:100vh; overflow-x:hidden; 
  -webkit-tap-highlight-color: transparent;
  line-height: 1.5;
  font-weight: 400;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

#loginScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; z-index:2000;
  transition:opacity .4s;
}
.login-wrap { width:380px; max-width:94vw; }
.login-logo {
  font-family:var(--head); font-size:clamp(32px,8vw,36px); font-weight:800; letter-spacing:2px;
  text-align:center; margin-bottom:4px; color:var(--text);
}
.login-logo span { color:var(--accent); }
.login-tagline {
  text-align:center; font-family:var(--mono); font-size:11px; color:var(--text3);
  letter-spacing:3px; text-transform:uppercase; margin-bottom:36px;
}
.login-box {
  background:var(--card); border:1px solid var(--border2); border-radius:16px;
  padding:clamp(28px,6vw,40px) clamp(24px,5vw,36px); 
  box-shadow:0 0 80px rgba(0,212,255,.04);
}

nav {
  background:var(--bg2); border-bottom:1px solid var(--border);
  height:56px; display:flex; align-items:center; justify-content:space-between;
  padding:0 clamp(12px,3vw,24px); position:sticky; top:0; z-index:100;
}
.nav-logo { 
  font-family:var(--head); font-size:clamp(16px,4vw,20px); 
  font-weight:800; letter-spacing:1px; 
}
.nav-logo span { color:var(--accent); }
.nav-tabs { display:flex; gap:4px; flex-wrap:wrap; }
.ntab {
  padding:6px clamp(8px,2vw,16px); border-radius:6px; font-family:var(--mono); 
  font-size:clamp(10px,2.5vw,12px); font-weight:500; letter-spacing:1px; 
  text-transform:uppercase; cursor:pointer; color:var(--text2); 
  border:none; background:none; transition:all .2s; white-space:nowrap;
}
.ntab:hover { color:var(--text); background:var(--bg3); }
.ntab.active { color:var(--accent); background:var(--adim); }
.nav-r { display:flex; align-items:center; gap:clamp(8px,2vw,16px); }
.nav-user { 
  font-family:var(--body); font-size:clamp(11px,2vw,13px); 
  color:var(--text2); letter-spacing:.5px; 
}
.nav-user b { color:var(--accent); font-weight:600; }
.btn-out {
  background:none; border:1px solid var(--border); color:var(--text3); 
  padding:5px clamp(10px,2vw,14px); border-radius:6px; 
  font-family:var(--body); font-size:clamp(10px,2vw,11px); font-weight:500;
  letter-spacing:.5px; cursor:pointer; transition:all .2s; 
  text-transform:uppercase; white-space:nowrap;
}
.btn-out:hover { border-color:var(--red); color:var(--red); }

.api-bar {
  background:var(--bg3); border-bottom:1px solid var(--border); 
  padding:8px clamp(12px,3vw,24px); display:flex; align-items:center; 
  gap:10px; font-family:var(--mono); font-size:10px; color:var(--text3); 
  letter-spacing:.5px; flex-wrap:wrap;
}
.api-dot { width:7px; height:7px; border-radius:50%; background:var(--text3); flex-shrink:0; }
.api-dot.live { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
.api-dot.err { background:var(--red); }
.api-dot.loading { background:var(--yellow); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.api-key-input {
  background:transparent; border:none; border-bottom:1px solid var(--border); 
  color:var(--accent); font-family:var(--mono); font-size:10px; 
  letter-spacing:.5px; width:clamp(220px,30vw,300px); outline:none; padding:3px 0;
}
.btn-api { 
  padding:4px 12px; background:var(--adim); border:1px solid var(--accent); 
  color:var(--accent); border-radius:5px; font-family:var(--body); font-weight:600;
  font-size:10px; cursor:pointer; letter-spacing:.5px; transition:all .2s; 
}
.btn-api:hover { background:var(--accent); color:var(--bg); }

#app { display:none; }
main { 
  padding:clamp(12px,3vw,20px) clamp(14px,4vw,24px); 
  max-width:1440px; margin:0 auto; 
}
.sec { display:none; }
.sec.active { display:block; }
.grid2 { display:grid; grid-template-columns:280px 1fr; gap:18px; }

.sidebar { display:flex; flex-direction:column; gap:14px; }
.scard { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.scard-h {
  padding:12px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.scard-title { font-family:var(--head); font-size:12px; font-weight:600; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--text2); }
.scard-b { padding:10px; }

.titem { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px;
  cursor:pointer; transition:background .15s; }
.titem:hover { background:var(--bg3); }
.ti-abbr {
  width:36px; height:36px; border-radius:8px; background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-family:var(--head);
  font-size:13px; font-weight:700; color:var(--accent); flex-shrink:0;
}
.ti-name { font-family:var(--head); font-size:14px; font-weight:600; line-height:1.3; }
.ti-lg { font-family:var(--body); font-size:10px; color:var(--text3); letter-spacing:.5px; margin-top:2px; }
.ti-form { display:flex; gap:3px; margin-top:5px; flex-wrap:wrap; }
.fb { width:14px; height:14px; border-radius:3px; display:flex; align-items:center;
  justify-content:center; font-size:8px; font-weight:700; color:var(--bg); font-family:var(--mono); }
.fb.W { background:var(--green); }
.fb.D { background:var(--yellow); }
.fb.L { background:var(--red); }
.btn-addteam {
  width:100%; padding:10px; background:none; border:1px dashed var(--border2); border-radius:8px;
  color:var(--text3); font-family:var(--body); font-size:11px; font-weight:500; cursor:pointer;
  transition:all .2s; margin-top:6px; text-transform:uppercase; letter-spacing:1px;
}
.btn-addteam:hover { border-color:var(--accent); color:var(--accent); }

.mcol { display:flex; flex-direction:column; gap:clamp(10px,2vw,14px); }
.sh {
  font-family:var(--head); font-size:clamp(11px,2.5vw,12px); font-weight:600; 
  letter-spacing:1.5px; color:var(--text2); text-transform:uppercase; 
  margin-bottom:8px; display:flex; align-items:center; gap:10px;
}
.sh::after { content:''; flex:1; height:1px; background:var(--border); }

.mcard {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  overflow:hidden; cursor:pointer; transition:all .2s;
}
.mcard:hover { border-color:var(--border2); background:var(--card2); }
.mcard.live { border-color:rgba(255,69,96,.3); }
.mcard-top {
  padding:10px 14px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.mc-league { 
  font-family:var(--body); font-size:clamp(9px,2vw,10px); font-weight:500; color:var(--text3); 
  letter-spacing:.5px; text-transform:uppercase; 
}
.mc-time { font-family:var(--mono); font-size:clamp(10px,2.5vw,12px); color:var(--text2); }
.live-badge {
  background:var(--rdim); color:var(--red); padding:2px 8px; border-radius:4px;
  font-family:var(--body); font-size:clamp(9px,2vw,10px); font-weight:600; 
  letter-spacing:.5px; border:1px solid rgba(255,69,96,.2);
}
.mcard-body { 
  padding:clamp(10px,2vw,12px) clamp(12px,3vw,16px) clamp(12px,2.5vw,14px); 
  display:flex; align-items:center; gap:8px; 
}
.mteam { flex:1; }
.mteam-name { 
  font-family:var(--head); font-size:clamp(16px,4vw,20px); 
  font-weight:700; line-height:1.2; 
}
.mscore {
  text-align:center; min-width:clamp(45px,12vw,60px); 
  font-family:var(--head); font-size:clamp(22px,6vw,30px); font-weight:700;
}
.mscore.vs { font-size:clamp(11px,3vw,13px); color:var(--text3); font-family:var(--mono); letter-spacing:2px; }

.modal-ov {
  position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:500;
  display:flex; align-items:flex-end; justify-content:center; opacity:0;
  pointer-events:none; transition:opacity .25s; backdrop-filter:blur(8px);
}
@media (min-width:640px) { .modal-ov { align-items:center; } }
.modal-ov.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--card); border:1px solid var(--border2); 
  border-radius:clamp(14px,3vw,16px) clamp(14px,3vw,16px) 0 0;
  width:100%; max-width:640px; max-height:85vh; overflow-y:auto;
  transform:translateY(16px); transition:transform .25s;
}
@media (min-width:640px) { .modal { border-radius:16px; width:640px; max-width:96vw; } }
.modal-ov.open .modal { transform:translateY(0); }
.modal-h {
  padding:clamp(16px,4vw,18px) clamp(18px,4vw,22px) clamp(12px,3vw,14px);
  border-bottom:1px solid var(--border); display:flex; align-items:center; 
  justify-content:space-between; position:sticky; top:0; 
  background:var(--card); z-index:2;
}
.modal-title { 
  font-family:var(--head); font-size:clamp(18px,4.5vw,20px); 
  font-weight:700; letter-spacing:.5px; 
}
.mclose { 
  background:none; border:none; color:var(--text3); font-size:24px; 
  cursor:pointer; transition:color .2s; line-height:1; 
  font-family:var(--mono); padding:8px; margin:-8px;
}
.mclose:hover { color:var(--text); }
.modal-b { padding:clamp(16px,4vw,20px) clamp(16px,4vw,22px); }

.score-block {
  background:var(--bg3); border:1px solid var(--border); border-radius:12px;
  padding:clamp(16px,4vw,22px); margin-bottom:18px; text-align:center;
}
.score-row { 
  display:flex; align-items:center; justify-content:center; 
  gap:clamp(12px,3vw,22px); margin-bottom:10px; 
}
.score-team-name { 
  font-family:var(--head); font-size:clamp(18px,4.5vw,22px); 
  font-weight:700; flex:1; word-break:break-word;
}
.score-num { 
  font-family:var(--head); font-size:clamp(40px,10vw,52px); 
  font-weight:700; min-width:75px; text-align:center; line-height:1; 
}
.score-meta { font-family:var(--body); font-size:11px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; }

.bt-header {
  font-family:var(--head); font-size:11px; font-weight:600; letter-spacing:1.5px; 
  color:var(--text2); text-transform:uppercase; margin-bottom:14px; 
  padding-top:18px; border-top:1px solid var(--border); margin-top:18px;
}
.bet-entry { background:var(--bg3); border:1px solid var(--border); border-radius:10px; margin-bottom:10px; overflow:hidden; }
.bet-entry-h {
  padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
  cursor:pointer;
}
.be-title { font-family:var(--head); font-size:15px; font-weight:600; }
.be-right { display:flex; align-items:center; gap:10px; }
.be-badge {
  padding:3px 10px; border-radius:4px; font-family:var(--body); font-size:10px;
  font-weight:600; letter-spacing:1px; text-transform:uppercase;
}
.be-badge.won { background:var(--gdim); color:var(--green); }
.be-badge.lost { background:var(--rdim); color:var(--red); }
.be-badge.pending { background:var(--ydim); color:var(--yellow); }
.be-chev { font-family:var(--mono); font-size:13px; color:var(--text3); transition:transform .2s; }
.be-chev.open { transform:rotate(180deg); }
.bet-entry-b { display:none; padding:0 16px 14px; }
.bet-entry-b.open { display:block; }

.cond-row {
  display:flex; align-items:flex-start; gap:12px; padding:12px 14px;
  background:var(--card); border-radius:8px; margin-bottom:8px; border:1px solid var(--border);
}
.cond-status-icon {
  width:28px; height:28px; border-radius:5px; display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:11px; font-weight:700; flex-shrink:0;
}
.cond-status-icon.ok { background:var(--gdim); color:var(--green); }
.cond-status-icon.fail { background:var(--rdim); color:var(--red); }
.cond-status-icon.pending { background:var(--ydim); color:var(--yellow); }
.cond-main { flex:1; }
.cond-text { font-family:var(--head); font-size:14px; font-weight:600; margin-bottom:4px; }
.cond-sub { font-family:var(--body); font-size:10px; color:var(--text3); letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; }
.cond-prog-labels { display:flex; justify-content:space-between; font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:.5px; margin-bottom:4px; }
.cond-bar { height:4px; background:var(--border); border-radius:2px; }
.cond-fill { height:100%; border-radius:2px; transition:width .5s; }
.cond-fill.ok { background:var(--green); }
.cond-fill.fail { background:var(--red); }
.cond-fill.pending { background:var(--yellow); }
.cond-val { font-family:var(--head); font-size:18px; font-weight:600; text-align:right; min-width:55px; }
.cond-val.ok { color:var(--green); }
.cond-val.fail { color:var(--red); }
.cond-val.pending { color:var(--yellow); }

.btn-new-bet {
  width:100%; padding:12px; margin-top:12px; background:none; border:1px dashed var(--border2);
  border-radius:8px; color:var(--text3); font-family:var(--body); font-size:11px; font-weight:500;
  letter-spacing:1px; cursor:pointer; transition:all .2s; text-transform:uppercase;
}
.btn-new-bet:hover { border-color:var(--accent); color:var(--accent); }

.bet-wizard { margin-top:12px; display:none; }
.bet-wizard.open { display:block; }

.wizard-category { margin-bottom:14px; }
.wizard-category-title {
  font-family:var(--head); font-size:16px; font-weight:700; 
  color:var(--text); margin-bottom:10px; letter-spacing:.3px;
}
.wizard-options-grid { display:flex; flex-direction:column; gap:6px; }
.wizard-option-row {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg3); border:1px solid var(--border); 
  border-radius:8px; padding:14px 16px; cursor:pointer;
  transition:all .15s;
}
.wizard-option-row:hover { border-color:var(--accent); background:var(--adim); }
.wizard-option-name { font-family:var(--head); font-size:14px; font-weight:500; color:var(--text); }
.wizard-option-arrow { color:var(--text3); font-size:16px; }

.wizard-ou-step {
  background:var(--card2); border:1px solid var(--border2); 
  border-radius:10px; padding:16px; margin:10px 0;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.wizard-ou-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.wizard-ou-title {
  font-family:var(--head); font-size:15px; font-weight:700; color:var(--text);
}
.wizard-ou-close {
  color:var(--text3); cursor:pointer; font-size:18px; padding:4px 8px;
}
.wizard-ou-subtitle {
  font-family:var(--body); font-size:10px; color:var(--accent); 
  letter-spacing:1px; text-transform:uppercase; margin-bottom:16px; font-weight:500;
}
.wizard-slider-container { padding:8px 0; }
.wizard-slider-value {
  text-align:center; font-family:var(--head); font-size:36px; font-weight:700;
  color:var(--accent); margin-bottom:12px;
}
.wizard-slider {
  width:100%; accent-color:var(--accent); height:5px;
  -webkit-appearance:none; background:var(--border); border-radius:3px;
}
.wizard-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:22px; height:22px; 
  background:var(--accent); border-radius:50%; cursor:pointer;
}
.wizard-slider-labels {
  display:flex; justify-content:space-between;
  font-family:var(--mono); font-size:10px; color:var(--text3);
  margin-top:6px;
}
.wizard-chips {
  display:flex; gap:8px; flex-wrap:wrap; margin:16px 0;
}
.wizard-chip {
  padding:7px 14px; background:var(--bg3); border:1px solid var(--border);
  border-radius:20px; color:var(--text2); font-family:var(--body); font-weight:500;
  font-size:12px; cursor:pointer; transition:all .15s;
}
.wizard-chip:hover { border-color:var(--accent); color:var(--accent); background:var(--adim); }
.wizard-ou-actions {
  display:flex; gap:10px; margin-top:20px;
}
.wizard-btn-primary {
  flex:1; padding:14px; background:var(--accent); color:var(--bg);
  font-family:var(--head); font-size:14px; font-weight:700; 
  letter-spacing:1px; border:none; border-radius:8px; cursor:pointer;
  text-transform:uppercase;
}
.wizard-btn-secondary {
  padding:14px 18px; background:none; border:1px solid var(--border);
  border-radius:8px; color:var(--text3); font-family:var(--body); font-weight:500;
  font-size:11px; cursor:pointer;
}

.wizard-added-conds { margin:14px 0; }
.wizard-cond-chip {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  background:var(--bg3); border:1px solid var(--border2); 
  border-radius:8px; margin-bottom:6px;
}
.wizard-cond-info { flex:1; }
.wizard-cond-name { font-family:var(--head); font-size:13px; font-weight:600; color:var(--text); }
.wizard-cond-detail { font-family:var(--body); font-size:10px; color:var(--text3); margin-top:3px; }
.wizard-cond-remove { color:var(--text3); cursor:pointer; font-size:16px; padding:4px; }
.wizard-cond-remove:hover { color:var(--red); }

.btn-save-bet {
  width:100%; padding:14px; margin-top:16px; background:var(--accent); 
  color:var(--bg); font-family:var(--head); font-size:15px; font-weight:700; 
  letter-spacing:1.5px; border:none; border-radius:8px; cursor:pointer; 
  text-transform:uppercase;
}

.sum-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px; }
@media (min-width:500px) { .sum-grid { grid-template-columns:repeat(4,1fr); gap:12px; } }
.sum-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 14px; }
.sum-val { font-family:var(--head); font-size:clamp(28px,6vw,32px); font-weight:700; line-height:1; }
.sum-val.g { color:var(--green); }
.sum-val.r { color:var(--red); }
.sum-val.a { color:var(--accent); }
.sum-lbl { font-family:var(--body); font-size:10px; font-weight:500; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin-top:6px; }

.acard { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:10px; overflow:hidden; }
.acard.won { border-left:5px solid var(--green); }
.acard.lost { border-left:5px solid var(--red); }
.acard.pending { border-left:5px solid var(--yellow); }
.acard-h { padding:16px 18px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.amatch { font-family:var(--head); font-size:17px; font-weight:700; }
.ameta { font-family:var(--body); font-size:10px; color:var(--text3); letter-spacing:.3px; margin-top:4px; }
.acard-b { display:none; padding:0 18px 18px; }
.acard-b.open { display:block; }

.ftabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.ftab {
  padding:8px 14px; background:var(--card); border:1px solid var(--border); 
  border-radius:6px; color:var(--text3); font-family:var(--body); font-weight:500;
  font-size:10px; cursor:pointer; transition:all .2s; 
  letter-spacing:.5px; text-transform:uppercase;
}

function readStat(match, statId) {
  if (!match) return 0;
  const sc = match.score || { h: 0, a: 0 };
  const statMap = {
    'goals_total': () => (sc.h || 0) + (sc.a || 0),
    'goals_home': () => sc.h || 0,
    'goals_away': () => sc.a || 0,
    'corners_total': () => 0, 'cards_total': () => 0,
  };
  return (statMap[statId] || (() => 0))();
}

function condStatus(c) {
  const current = c.current || 0;
  const target = c.target || 0;
  const dir = c.dir || 'over';
  const matchStatus = c.matchStatus || 'today';
  if (matchStatus === 'finished') {
    if (dir === 'over') return current >= target ? 'ok' : 'fail';
    if (dir === 'under') return current <= target ? 'ok' : 'fail';
  }
  if (dir === 'over' && current >= target) return 'ok';
  if (dir === 'under' && current > target) return 'fail';
  return 'pending';
}

function evalOverall(bet) {
  if (!bet.conditions?.length) return 'pending';
  const statuses = bet.conditions.map(c => condStatus(c));
  if (statuses.every(s => s === 'ok')) return 'won';
  if (statuses.some(s => s === 'fail')) return 'lost';
  if (statuses.some(s => s === 'pending')) return 'pending';
  return 'pending';
}

      const url = PROXY_URL + '?path=' + encodeURIComponent(path) + '&token=' + encodeURIComponent(apiKey);
      const res = await fetch(url);
      const text = await res.text();

      if(data.matches?.length) {

        allMatches.push(...data.matches.map(m => ({...m, _liga: league.liga, _leagueName: league.name})));
      }
    } catch(e) {}
  }
  
  if(allMatches.length === 0) {
    addDebug(`🔄 Probando ayer (${yesterday})...`, 'info');
    for(const league of LEAGUES) {
      try {
        const path = `competitions/${league.code}/matches?dateFrom=${yesterday}&dateTo=${yesterday}`;
        const url = PROXY_URL + '?path=' + encodeURIComponent(path) + '&token=' + encodeURIComponent(apiKey);
        const res = await fetch(url);
        const text = await res.text();
        const data = JSON.parse(text);
        if(data.matches?.length) {
          allMatches.push(...data.matches.map(m => ({...m, _liga: league.liga, _leagueName: league.name})));
        }
      } catch(e) {}
    }
  }
  
  addDebug(`📊 Total: ${allMatches.length} partidos`, allMatches.length ? 'success' : 'error');
  
  matches = allMatches.map(m => {
    const status = m.status === 'IN_PLAY' || m.status === 'PAUSED' ? 'live' : (m.status === 'FINISHED' ? 'finished' : 'today');
    const sc = m.score.fullTime;
    return {
      id: 'm'+m.id,
      h: m.homeTeam.shortName || m.homeTeam.name,
      a: m.awayTeam.shortName || m.awayTeam.name,
      lg: m._leagueName, liga: m._liga, status,
      time: status === 'live' ? (m.minute + "'") : new Date(m.utcDate).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}),
      date: new Date(m.utcDate).toLocaleDateString('es-ES', {weekday:'short', day:'numeric', month:'short'}),
      score: sc.home !== null ? {h: sc.home, a: sc.away} : null
    };
  });
  
  renderMatchesByStatus();
  setApiStatus('live', `✅ ${matches.length} partidos`);
  toast(`${matches.length} partidos cargados`);
}

function setApiStatus(state, msg) {
  document.getElementById('apiDot').className = 'api-dot' + (state==='live'?' live':state==='err'?' err':' loading');
  document.getElementById('apiStatus').textContent = msg;
}

function goSec(id, btn) {
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

function init() {
  renderFavTeams();
  renderMatchesByStatus();
  renderUpcoming();
  renderBets();
  renderSummary();
}

function renderFavTeams() {
  document.getElementById('tc').textContent = favIds.length+'/12';
  document.getElementById('favList').innerHTML = TEAMS.filter(t=>favIds.includes(t.id)).map(t=>`
    <div class="titem" onclick="showTeamDetail(${t.id})">
      <div class="ti-abbr">${t.abbr}</div>
      <div><div class="ti-name">${t.name}</div><div class="ti-lg">${t.lg}</div></div>
    </div>
  `).join('') + `<button class="btn-addteam" onclick="openAddTeam()">+ Agregar Equipo</button>`;
}

function showTeamDetail(id) {
  const t = TEAMS.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('teamDetailCard').style.display = 'block';
  document.getElementById('tdTitle').textContent = t.abbr + ' — ' + t.name;
  document.getElementById('tdBody').innerHTML = `
    <div class="team-stats-container">
      <div class="team-stat-row"><span class="team-stat-label">xG Promedio</span><span class="team-stat-value" style="color:var(--accent)">${t.stats.xg}</span></div>
      <div class="team-stat-row"><span class="team-stat-label">Posesión %</span><span class="team-stat-value" style="color:var(--accent)">${t.stats.pos}%</span></div>
    </div>
  `;
}

function openAddTeam() { tempTeams = [...favIds]; document.getElementById('addTeamModal').classList.add('open'); renderTeamSearch(); }
function renderTeamSearch() {
  const q = document.getElementById('tsearch').value.toLowerCase();
  document.getElementById('tslist').innerHTML = TEAMS.filter(t=>t.name.toLowerCase().includes(q)||t.lg.toLowerCase().includes(q)).map(t=>`
    <div class="ats ${tempTeams.includes(t.id)?'sel':''}" onclick="toggleTeamTemp(${t.id})">
      <div class="ti-abbr" style="width:32px;height:32px">${t.abbr}</div>
      <div><div class="ti-name">${t.name}</div><div class="ti-lg">${t.lg}</div></div>
      <span class="ats-check">✓</span>
    </div>
  `).join('');
}
function toggleTeamTemp(id) {
  if(tempTeams.includes(id)) tempTeams = tempTeams.filter(i=>i!==id);
  else if(tempTeams.length<12) tempTeams.push(id);
  else { toast('Máximo 12 equipos'); return; }
  renderTeamSearch();
}
function confirmTeams() { favIds = [...tempTeams]; saveFavIds(); renderFavTeams(); closeModal('addTeamModal'); toast('Equipos guardados'); }

function renderMatchesByStatus() {
  document.getElementById('liveDiv').innerHTML = renderMatchList(matches.filter(m=>m.status==='live'));
  document.getElementById('todayDiv').innerHTML = renderMatchList(matches.filter(m=>m.status==='today'));
  document.getElementById('finishedDiv').innerHTML = renderMatchList(matches.filter(m=>m.status==='finished'));
}
function renderMatchList(list) {
  if(!list.length) return '<div class="empty-state">Sin partidos</div>';
  return list.map(m=>`<div class="mcard ${m.status==='live'?'live':''}" onclick="openMatchModal('${m.id}')"><div class="mcard-top"><span class="mc-league">${m.lg}</span>${m.status==='live'?`<span class="live-badge">EN VIVO ${m.time}</span>`:`<span class="mc-time">${m.time}</span>`}</div><div class="mcard-body"><div class="mteam"><div class="mteam-name">${m.h}</div></div>${m.score?`<div class="mscore">${m.score.h}-${m.score.a}</div>`:`<div class="mscore vs">VS</div>`}<div class="mteam" style="text-align:right"><div class="mteam-name">${m.a}</div></div></div></div>`).join('');
}

function openMatchModal(id) {
  const m = matches.find(x=>x.id===id) || upcomingList.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('mmTitle').textContent = m.h + ' vs ' + m.a;
  let html = `<div class="score-block"><div class="score-row"><div class="score-team-name">${m.h}</div>`;
  if(m.score) html += `<div class="score-num">${m.score.h}-${m.score.a}</div>`;
  else html += `<div class="score-num" style="color:var(--text3);font-size:28px">VS</div>`;
  html += `<div class="score-team-name away">${m.a}</div></div></div>`;
  html += buildBetTracker(id, m);
  document.getElementById('mmBody').innerHTML = html;
  document.getElementById('matchModal').classList.add('open');
}

function buildBetTracker(matchId, m) {
  const myBets = bets.filter(b=>b.matchId===matchId);
  let html = `<div class="bt-header">Mis Apuestas</div>`;
  html += myBets.map((b,i)=>buildBetEntryHtml(b,i)).join('');
  html += buildBetWizard(matchId, m);
  return html;
}

function buildBetEntryHtml(b, i) {
  const ov = evalOverall(b);
  return `<div class="bet-entry"><div class="bet-entry-h" onclick="toggleBetBody(this)"><div class="be-title">${b.desc||('Apuesta '+(i+1))}</div><div class="be-right"><div class="be-badge ${ov}">${ov==='won'?'GANADA':ov==='lost'?'PERDIDA':'PENDIENTE'}</div><span class="be-chev">▼</span></div></div><div class="bet-entry-b">${b.conditions.map(c=>buildCondRow(c)).join('')}</div></div>`;
}

function buildCondRow(c) {
  const st = condStatus(c);
  const pct = c.target>0 ? Math.min(100,Math.round(c.current/c.target*100)) : 0;
  return `<div class="cond-row"><div class="cond-status-icon ${st}">${st==='ok'?'✓':st==='fail'?'✗':'○'}</div><div class="cond-main"><div class="cond-text">${c.mktName}</div><div class="cond-sub">${c.dirLabel}</div><div class="cond-prog-labels"><span>Actual: ${c.current}</span><span>Target: ${c.target}</span></div><div class="cond-bar"><div class="cond-fill ${st}" style="width:${pct}%"></div></div></div><div class="cond-val ${st}">${c.current}/${c.target}</div></div>`;
}

function toggleBetBody(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.be-chev');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function toggleWizard(id) { document.getElementById(id).classList.toggle('open'); }

function selectMarketOption(matchId, mktId, mktName, mktStat, row) {
  document.querySelectorAll('.wizard-option-row').forEach(r=>r.classList.remove('active'));
  row.classList.add('active');
  if(!wizardState[matchId]) wizardState[matchId] = { conds: [] };
  wizardState[matchId].pendingMkt = { id: mktId, name: mktName, stat: mktStat };
  const container = document.getElementById('ouStep-'+matchId);
  const suggestions = OU_SUGGESTIONS[mktStat] || OU_SUGGESTIONS.default;
  const maxVal = mktStat?.includes('corners') ? 20 : (mktStat?.includes('cards') ? 10 : 8);
  container.innerHTML = `
    <div class="wizard-ou-step">
      <div class="wizard-ou-header"><div class="wizard-ou-title">${mktName}</div><span class="wizard-ou-close" onclick="closeOUStep('${matchId}')">✕</span></div>
      <div class="wizard-ou-subtitle">SELECCIONA LA LÍNEA</div>
      <div class="wizard-slider-container">
        <div class="wizard-slider-value" id="ouVal-${matchId}">2.5</div>
        <input type="range" class="wizard-slider" id="ouSlider-${matchId}" min="0.5" max="${maxVal}" step="0.5" value="2.5" oninput="document.getElementById('ouVal-${matchId}').textContent = this.value">
        <div class="wizard-slider-labels"><span>0.5</span><span>${maxVal}</span></div>
      </div>
      <div class="wizard-chips">${suggestions.map(v=>`<span class="wizard-chip" onclick="setSliderValue('${matchId}','${v}')">${v}</span>`).join('')}</div>
      <div class="wizard-ou-actions">
        <button class="wizard-btn-primary" onclick="addConditionNew('${matchId}','over')">OVER</button>
        <button class="wizard-btn-primary" onclick="addConditionNew('${matchId}','under')" style="background:var(--card); color:var(--text); border:1px solid var(--border)">UNDER</button>
        <button class="wizard-btn-secondary" onclick="closeOUStep('${matchId}')">Cancelar</button>
      </div>
    </div>
  `;
}

function setSliderValue(matchId, val) {
  const slider = document.getElementById('ouSlider-'+matchId);
  if(slider) { slider.value = val; document.getElementById('ouVal-'+matchId).textContent = val; }
}

function closeOUStep(matchId) {
  document.getElementById('ouStep-'+matchId).innerHTML = '';
  document.querySelectorAll('.wizard-option-row').forEach(r=>r.classList.remove('active'));
  if(wizardState[matchId]) wizardState[matchId].pendingMkt = null;
}

function addConditionNew(matchId, dir) {
  const ws = wizardState[matchId];
  if(!ws?.pendingMkt) { toast('Selecciona un mercado'); return; }
  const slider = document.getElementById('ouSlider-'+matchId);
  const val = slider ? parseFloat(slider.value) : 2.5;
  const mkt = ws.pendingMkt;
  const m = matches.find(x=>x.id===matchId);
  const dirLabel = (dir==='over'?'OVER ':'UNDER ') + val.toFixed(1);
  const current = m ? readStat(m, mkt.stat) : 0;
  if(!ws.conds) ws.conds = [];
  ws.conds.push({ mktId: mkt.id, mktName: mkt.name, dir, dirLabel, target: val, current, stat: mkt.stat, matchStatus: m?.status || 'today' });
  closeOUStep(matchId);
  ws.pendingMkt = null;
  renderAddedConds(matchId);
  toast('Condición agregada');
}

function renderAddedConds(matchId) {
  const ws = wizardState[matchId];
  const el = document.getElementById('aclist-'+matchId);
  if(!el) return;
  el.innerHTML = (ws?.conds || []).map((c,i)=>`
    <div class="wizard-cond-chip">
      <div class="wizard-cond-info"><div class="wizard-cond-name">${c.mktName}</div><div class="wizard-cond-detail">${c.dirLabel}</div></div>
      <span class="wizard-cond-remove" onclick="removeCondWiz('${matchId}',${i})">✕</span>
    </div>
  `).join('');
}

function removeCondWiz(matchId, i) {
  if(wizardState[matchId]?.conds) { wizardState[matchId].conds.splice(i,1); renderAddedConds(matchId); }
}

function saveBetWizard(matchId, h, a, lg, date) {
  const ws = wizardState[matchId];
  const descEl = document.getElementById('wd-'+matchId);
  const desc = (descEl?.value) || (h + ' vs ' + a);
  if(!ws?.conds?.length) { toast('Agrega al menos una condición'); return; }
  bets.push({ id: 'b'+Date.now(), matchId, h, a, lg, date, status: 'pending', desc, conditions: ws.conds.slice() });
  saveBets();
  wizardState[matchId] = {conds:[]};
  document.getElementById('matchModal').classList.remove('open');
  renderBets(); renderSummary();
  toast('✅ Apuesta guardada');
}

function buildBetWizard(matchId, m) {
  const wid = 'wiz-'+matchId;
  let html = `<button class="btn-new-bet" onclick="toggleWizard('${wid}')">+ Nueva Apuesta</button>`;
  html += `<div class="bet-wizard" id="${wid}">`;
  html += `<input class="wiz-input" id="wd-${matchId}" placeholder="Nombre de la apuesta" value="${(m?.h||'')} vs ${(m?.a||'')}">`;
  MARKET_CATEGORIES.forEach(cat => {
    html += `<div class="wizard-category"><div class="wizard-category-title">${cat.name}</div><div class="wizard-options-grid">`;
    cat.markets.forEach(mkt => {
      html += `<div class="wizard-option-row" onclick="selectMarketOption('${matchId}','${mkt.id}','${mkt.name}','${mkt.stat||''}', this)"><span class="wizard-option-name">${mkt.name}</span><span class="wizard-option-arrow">›</span></div>`;
    });
    html += `</div></div>`;
  });
  html += `<div id="ouStep-${matchId}"></div><div id="aclist-${matchId}" class="wizard-added-conds"></div>`;
  html += `<button class="btn-save-bet" onclick="saveBetWizard('${matchId}','${(m?.h||'').replace(/'/g,"\\'")}','${(m?.a||'').replace(/'/g,"\\'")}','${(m?.lg||'').replace(/'/g,"\\'")}','${(m?.date||'').replace(/'/g,"\\'")}')">Guardar Apuesta</button>`;
  html += `</div>`;
  return html;
}

function renderUpcoming() { document.getElementById('upcomingDiv').innerHTML = '<div class="empty-state">Carga la API para ver partidos</div>'; }
function renderBets() { document.getElementById('betsDiv').innerHTML = '<div class="empty-state">No hay apuestas</div>'; }
function renderSummary() { document.getElementById('sumDiv').innerHTML = '<div class="sum-card"><div class="sum-val">0</div></div><div class="sum-card"><div class="sum-val g">0</div></div><div class="sum-card"><div class="sum-val r">0</div></div><div class="sum-card"><div class="sum-val a">0</div></div>'; }
function filterUp() {}
function filterBets() {}

window.signInWithGoogle=signInWithGoogle; window.launchApp=launchApp; window.doLogout=doLogout;
window.connectAPI=connectAPI; window.testProxy=testProxy; window.goSec=goSec;
window.openMatchModal=openMatchModal; window.closeModal=closeModal;
window.toggleWizard=toggleWizard; window.selectMarketOption=selectMarketOption;
window.setSliderValue=setSliderValue; window.closeOUStep=closeOUStep;
window.addConditionNew=addConditionNew; window.removeCondWiz=removeCondWiz;
window.saveBetWizard=saveBetWizard; window.toggleBetBody=toggleBetBody;
window.filterUp=filterUp; window.filterBets=filterBets;
window.openAddTeam=openAddTeam; window.renderTeamSearch=renderTeamSearch;
window.toggleTeamTemp=toggleTeamTemp; window.confirmTeams=confirmTeams; window.showTeamDetail=showTeamDetail;
</script>
</body>
</html>
